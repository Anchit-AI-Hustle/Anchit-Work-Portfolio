<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anchit Tandon — QR Connect Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400..600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F0D0A; --bg-deep:#060503; --ink:#FBF5EC; --ink-dim:#A39E94;
    --ink-mute:#5A554E; --rule:#2A261F; --rule-strong:#3D3830;
    --primary:#FF6940; --primary-deep:#FF4D1F; --accent:#2EE5AC;
    --font-display:'Fraunces',serif; --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#070605;font-family:var(--font-body);color:var(--ink);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;padding:40px 16px}
  .hint{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-mute);text-align:center;max-width:520px;line-height:1.7}

  /* 1200x1200 square → 560 on screen */
  .sq{width:min(520px,92vw);aspect-ratio:1;border-radius:36px;position:relative;overflow:hidden;
    background:
      radial-gradient(80% 80% at 50% 0%, rgba(255,105,64,.20), transparent 60%),
      radial-gradient(90% 70% at 50% 120%, rgba(46,229,172,.10), transparent 55%),
      linear-gradient(160deg,#15120E,var(--bg) 55%,var(--bg-deep));
    border:1px solid var(--rule-strong);
    box-shadow:0 40px 90px rgba(0,0,0,.6);
    display:flex;flex-direction:column;align-items:center;padding:46px 44px}
  .sq::after{content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:3px 3px;mix-blend-mode:overlay;opacity:.5}
  .head{display:flex;align-items:center;gap:14px;align-self:stretch;z-index:2}
  .mark{width:52px;height:52px;border-radius:14px;object-fit:cover;
    border:1px solid rgba(255,105,64,.5);box-shadow:0 0 0 4px rgba(255,77,31,.10)}
  .who .n{font-family:var(--font-display);font-size:24px;font-weight:600;line-height:1}
  .who .r{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.26em;
    text-transform:uppercase;color:var(--accent);margin-top:6px}

  .qrwrap{flex:1;display:flex;align-items:center;justify-content:center;z-index:2;width:100%;min-height:0}
  .bigtag{font-family:var(--font-display);font-size:34px;line-height:1.12;font-weight:600;
    text-align:center;max-width:90%;color:var(--ink)}
  .bigtag em{font-style:normal;color:var(--primary)}
  .qr{width:min(286px,58%);aspect-ratio:1;background:#fff;border-radius:24px;padding:4%;
    box-shadow:0 24px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(255,105,64,.25),
      0 0 0 9px rgba(255,77,31,.06)}
  .qr img{width:100%;height:100%;display:block;border-radius:12px}

  .foot{align-self:stretch;display:flex;align-items:center;justify-content:space-between;z-index:2}
  .foot .scan{font-family:var(--font-mono);font-size:12px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--ink-dim)}
  .foot .url{font-family:var(--font-mono);font-size:12px;color:var(--primary);
    border:1px solid rgba(255,105,64,.35);border-radius:8px;padding:6px 11px}
</style>
</head>
<body>
  <div class="sq">
    <div class="head">
      <img class="mark" src="AnchitTandon-AppLogo.png" alt="AT">
      <div class="who">
        <div class="n">Anchit Tandon</div>
        <div class="r">Product · Growth · Revenue</div>
      </div>
    </div>
    <div class="qrwrap">
      <p class="bigtag">An engineer who <em>learned to love the funnel.</em></p>
    </div>
    <div class="foot">
      <span class="scan">See my portfolio</span>
      <span class="url">anchittandon.vercel.app</span>
    </div>
  </div>
  <p class="hint">Square 1:1 — best for a LinkedIn <b>featured</b> item, post, or banner inset. Screenshot the card above.</p>
</body>
</html>
