<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Anchit Tandon - Interactive Portfolio</title>
  <meta name="description" content="Anchit Tandon - product leader, AI builder, and D2C growth operator.">
  <meta name="theme-color" content="#11100e">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon-192.png">
  <meta http-equiv="refresh" content="0; url=/cyber/">
  <style>
    :root {
      --paper: #f7f0e2;
      --gold: #f3b331;
      --orange: #ff5b1f;
      --line: rgba(255,255,255,0.12);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--paper);
      background: #0b0a08;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 91, 31, 0.24), transparent 30rem),
        linear-gradient(135deg, #0b0a08, #17120d 48%, #050505);
    }

    .splash {
      width: min(420px, calc(100vw - 40px));
      display: grid;
      justify-items: center;
      gap: 18px;
      text-align: center;
    }

    img {
      width: 132px;
      height: 132px;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid rgba(243, 179, 49, 0.46);
      box-shadow: 0 0 70px rgba(255, 91, 31, 0.28);
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 7vw, 54px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: rgba(247, 240, 226, 0.72);
    }

    a {
      color: #130f08;
      background: linear-gradient(135deg, var(--gold), var(--orange));
      border-radius: 8px;
      padding: 12px 16px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
  <script>
    window.location.replace("/cyber/");
  </script>
</head>
<body>
  <main class="splash">
    <img src="AnchitTandon-AppLogo.png" alt="Anchit Tandon logo">
    <h1>Anchit Tandon</h1>
    <p>Opening the interactive portfolio.</p>
    <a href="/cyber/">Enter portfolio</a>
  </main>
</body>
</html>
