>\n            </svg>\n          </span>\n        </a>\n      </div>\n    </div>\n  </section>\n\n  <!-- PROJECTS \u2014 Side Builds -->", "deep_proj": "<section class=\"view\" id=\"view-projects\">\n    <div class=\"container\">\n      <div class=\"section-head reveal\">\n        <div class=\"eyebrow\">Personal projects \u00b7 All live \u00b7 Built end-to-end</div>\n        <h1 class=\"display-lg\">Side Projects</h1>\n        <p class=\"lede\" style=\"margin-top: 16px;\">Eight AI-first experiments, built end-to-end on weekends and evenings out of curiosity and love for technology. <em>Ideas that wouldn't wait for permission.</em></p>\n      </div>\n\n      <div class=\"builds-grid reveal-stagger\">\n        <a class=\"build-card tilt-card\" href=\"#project-lifecycle\" data-view=\"project-lifecycle\">\n          <div class=\"build-tag\"><span>D2C Retention \u00b7 PWA</span><span class=\"status\">Live</span></div>\n          <h3>VAHDAM <em>Lifecycle OS</em></h3>\n          <p>Reads your campaign, customer &amp; order data, builds a retention dashboard, plans a 30-day mailer calendar, then drafts every email \u2014 one workflow, dashboard to send.</p>\n          <span class=\"build-arrow\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"7\" y1=\"17\" x2=\"17\" y2=\"7\"/><polyline points=\"7 7 17 7 17 17\"/></svg></span>\n        </a>\n        <a class=\"build-card tilt-card\" href=\"#project-music\" data-view=\"project-music\">\n          <div class=\"build-tag\"><span>Generative AI \u00b7 Music</span><span class=\"status\">Live</span></div>\n          <h3>Music<em>GenAI</em></h3>\n          <p>Type a prompt, get a full song \u2014 lyrics, vocals and production. A hobby build exploring how far text-to-music can go.</p>\n          <span class=\"build-arrow\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"7\" y1=\"17\" x2=\"17\" y2=\"7\"/><polyline points=\"7 7 17 7 17 17\"/></svg></span>\n        </a>\n        <a class=\"build-card tilt-card\" href=\"#project-tasktracker\" data-view=\"project-tasktracker\">\n          <div class=\"build-tag\"><span>Personal Productivity \u00b7 AI</span><span class=\"status\">Live</span></div>\n          <h3>Task <em>Tracker</em></h3>\n          <p>Turns emails, meetings &amp; voice notes into tasks on a live Jira-style board \u2014 add, drag, filter and assign, so nothing slips.</p>\n          <span class=\"build-arrow\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"7\" y1=\"17\" x2=\"17\" y2=\"7\"/><polyline points=\"7 7 17 7 17 17\"/></svg></span>\n        </a>\n        <a class=\"build-card tilt-card\" href=\"#project-thirdeye\" data-view=\"project-thirdeye\">\n          <div class=\"build-tag\"><span>Personal AI OS</span><span class=\"status\">Live</span></div>\n          <h3>The Third <em>Eye</em></h3>\n          <p>An agent-orchestrated personal AI OS \u2014 memory-backed chat, tasks and multi-phase automation in one place.</p>\n          <span class=\"build-arrow\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"7\" y1=\"17\" x2=\"17\" y2=\"7\"/><polyline points=\"7 7 17 7 17 17\"/></svg></span>\n        </a>\n        <a class=\"build-card tilt-card\" href=\"#project-yaara\" data-view=\"project-yaara\">\n          <div class=\"build-tag\"><span>AI Voice \u00b7 Consumer</span><span class=\"status\">Live</span></div>\n          <h3>Hey <em>Yaara</em></h3>\n          <p>A voice-first AI companion for the elderly \u2014 one button to talk, one to stop. Built for people who find apps intimidating.</p>\n          <span class=\"build-arrow\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"7\" y1=\"17\" x2=\"17\" y2=\"7\"/><polyline points=\"7 7 17 7 17 17\"/></svg></span>\n        </a>\n        <a class=\"build-card tilt-card\" href=\"#project-mailer\" data-view=\"project-mailer\">\n          <div class=\"build-tag\"><span>AI Tooling \u00b7 Marketing</span><span class=\"status\">Live</span></div>\n          <h3>Mailer <em>Architect</em></h3>\n          <p>Turns a campaign brief into a production-ready HTML email via a multi-LLM cascade with automatic failover.</p>\n          <span class=\"build-arrow\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"7\" y1=\"17\" x2=\"17\" y2=\"7\"/><polyline points=\"7 7 17 7 17 17\"/></svg></span>\n        </a>\n        <a class=\"build-card tilt-card\" href=\"#project-telesuite\" data-view=\"project-telesuite\">\n          <div class=\"build-tag\"><span>AI Workflow \u00b7 Sales</span><span class=\"status\">Live</span></div>\n          <h3>AI <em>TeleSuite</em></h3>\n          <p>Real-time transcription, pitch scoring and conversion assist for solo operators \u2014 the consumer take on the telesuite I shipped at ET.</p>\n          <span class=\"build-arrow\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"7\" y1=\"17\" x2=\"17\" y2=\"7\"/><polyline points=\"7 7 17 7 17 17\"/></svg></span>\n        </a>\n        <a class=\"build-card tilt-card\" href=\"#project-lifeengine\" data-view=\"project-lifeengine\">\n          <div class=\"build-tag\"><span>AI Wellness \u00b7 Personalised</span><span class=\"status\">Live</span></div>\n          <h3>TH+ <em>LifeEngine</em></h3>\n          <p>AI wellness planning that turns generic health advice into a daily plan tied to your goals.</p>\n          <span class=\"build-arrow\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"7\" y1=\"17\" x2=\"17\" y2=\"7\"/><polyline points=\"7 7 17 7 17 17\"/></svg></span>\n        </a>\n      </div>\n    </div>\n  </section>\n\n  <!-- PROJECT: HEY YAARA -->\n  <section class=\"view\" id=\"view-project-yaara\">\n    <div class=\"container\">\n      <a class=\"back-link\" href=\"#projects\" data-view=\"projects\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"/><polyline points=\"12 19 5 12 12 5\"/></svg>\n        All side projects\n      </a>\n      <div class=\"project-hero reveal\">\n        <div class=\"eyebrow\">AI Voice \u00b7 Consumer \u00b7 PWA</div>\n        <h1 class=\"display-lg\">Hey <em>Yaara</em></h1>\n        <p class=\"quote\">\"An AI voice companion for elderly. Talk, listen, and never feel alone.\"</p>\n        <div class=\"project-meta\">\n          <div><span class=\"label\">Role</span><span>Founder \u00b7 Designer \u00b7 Engineer</span></div>\n          <div><span class=\"label\">Status</span><span>Live</span></div>\n          <div><span class=\"label\">Stack</span><span>React \u00b7 PWA \u00b7 LLM Voice</span></div>\n        </div>\n        <div class=\"project-cta\">\n          <a href=\"https://hey-yaara.vercel.app/\" target=\"_blank\" rel=\"noopener\" class=\"btn primary\">Open live app \u2197</a>\n        </div>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">The pitch</div>\n        <h2>What it is</h2>\n        <p>Hey Yaara is an AI voice companion built specifically for elderly users. It listens, it responds in a warm conversational tone, and it does not demand the user learn anything new. No app navigation, no menus, no notifications competing for attention. You open it, you speak, you're heard.</p>\n        <p>It runs as a Progressive Web App \u2014 installable on any phone or tablet, no app store, no download friction. The interface is deliberately spare: one button to start talking, one to stop. Everything else is voice.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Origin</div>\n        <h2>Why I built it</h2>\n        <p>India has roughly 140 million people over 60. A huge share of them live alone, or with family members who are out of the house most of the day. The loneliness problem is well documented; the technology gap is too. Most \"senior-friendly\" apps still assume you know how to navigate a smartphone.</p>\n        <p>I wanted to see what a tool would look like if it started from <em>voice first</em>, not screen first. Something my own family members could use without me having to teach them.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Problem it solves</div>\n        <h2>What's broken without it</h2>\n        <ul>\n          <li><strong>Loneliness without a conversational outlet.</strong> Family calls are precious but rationed. A voice companion is always available, never tired, never busy.</li>\n          <li><strong>App fatigue and interface anxiety.</strong> Buttons, menus, gestures, notifications \u2014 all of it is friction. Voice removes the entire learning curve.</li>\n          <li><strong>The \"I don't want to be a burden\" problem.</strong> Many elderly users hesitate to ask family for help with small things. A neutral AI removes that emotional cost.</li>\n          <li><strong>Cognitive engagement.</strong> Light conversational stimulation has measurable benefits on cognitive sharpness in later years.</li>\n        </ul>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">What I'd build next</div>\n        <h2>The roadmap in my head</h2>\n        <p>Multilingual support is the most obvious next move \u2014 Hindi-first, then regional. Voice cloning so a user's children can record a \"voice they recognise\". Family hand-off \u2014 moments where the AI says \"let me get your daughter on the line for this one\".</p>\n        <p>And a hardware companion \u2014 a dedicated, always-listening, single-purpose device that doesn't require holding a phone.</p>\n      </div>\n\n      <div class=\"iframe-wrap reveal\">\n        <div class=\"iframe-bar\"><div class=\"dots\"><span></span><span></span><span></span></div>hey-yaara.vercel.app</div>\n        <iframe src=\"https://hey-yaara.vercel.app/\" loading=\"lazy\" title=\"Hey Yaara live preview\"></iframe>\n      </div>\n    </div>\n  </section>\n\n  <!-- PROJECT: MUSICGENAI -->\n  <section class=\"view\" id=\"view-project-music\">\n    <div class=\"container\">\n      <a class=\"back-link\" href=\"#projects\" data-view=\"projects\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"/><polyline points=\"12 19 5 12 12 5\"/></svg>\n        All side projects\n      </a>\n      <div class=\"project-hero reveal\">\n        <div class=\"eyebrow\">Generative AI \u00b7 Music \u00b7 Full-stack</div>\n        <h1 class=\"display-lg\">Music<em>GenAI</em></h1>\n        <p class=\"quote\">\"Type a prompt, get a song \u2014 with verified lyrics, generated vocals, and the whole pipeline in your hands.\"</p>\n        <div class=\"project-meta\">\n          <div><span class=\"label\">Role</span><span>Founder \u00b7 Full-stack engineer</span></div>\n          <div><span class=\"label\">Status</span><span>Live</span></div>\n          <div><span class=\"label\">Stack</span><span>Vite \u00b7 React \u00b7 TS \u00b7 Supabase \u00b7 Python</span></div>\n        </div>\n        <div class=\"project-cta\">\n          <a href=\"https://music-gen-ai-blue.vercel.app/\" target=\"_blank\" rel=\"noopener\" class=\"btn primary\">Open live app \u2197</a>\n        </div>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">The pitch</div>\n        <h2>What it is</h2>\n        <p>MusicGenAI is an AI-powered music generation app. You give it a prompt \u2014 a mood, a genre, a theme \u2014 and it composes a full track with vocals, generated lyrics, and verified output. The whole pipeline runs end-to-end on a stack I built: React/TypeScript frontend on Vite, Supabase for storage and auth, and a Python microservice handling the vocal synthesis.</p>\n        <p>It's not a wrapper around someone else's model. It's a real composition tool with its own orchestration layer.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Origin</div>\n        <h2>Why I built it</h2>\n        <p>The first wave of AI music tools (Suno, Udio, others) showed what's possible, but they're all closed boxes \u2014 you get an output and you don't see the seams. I wanted to understand the pipeline by building one myself: prompt parsing, melody generation, lyric generation, lyric <em>verification</em> (a step most tools skip), vocal synthesis, and final mixing.</p>\n        <p>Beyond curiosity, this was a real PM exercise too \u2014 for any AI music product to be a sustainable business, you need control over the failure modes. You can't operate at scale if you don't know <em>why</em> a track came out wrong. Building the pipeline taught me where the failure modes actually live.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Problem it solves</div>\n        <h2>What's broken without it</h2>\n        <ul>\n          <li><strong>Existing tools are black boxes.</strong> When the lyrics drift or the vocal sounds off, you can't debug it. MusicGenAI exposes the stages so you can fix them.</li>\n          <li><strong>Lyric hallucination.</strong> Most generators will happily produce nonsense. The verification step catches and rewrites bad lines before the vocal layer runs.</li>\n          <li><strong>Indie creators want control, not magic.</strong> Songwriters who use AI as a co-writer need to nudge each stage \u2014 pick the melody first, then iterate on lyrics, then choose a vocal. The pipeline supports that.</li>\n          <li><strong>Cost transparency.</strong> Running your own stack means you know what every track costs to generate.</li>\n        </ul>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Tech notes</div>\n        <h2>How it's built</h2>\n        <ul>\n          <li><strong>Frontend</strong> \u2014 Vite + React + TypeScript + shadcn/ui + Tailwind. Fast, type-safe, no friction.</li>\n          <li><strong>Auth &amp; storage</strong> \u2014 Supabase, with row-level security so users only see their own generations.</li>\n          <li><strong>Vocal pipeline</strong> \u2014 Python microservice (Dockerised, runs separately) that handles the heavier audio synthesis steps.</li>\n          <li><strong>Lyric verification</strong> \u2014 A standalone TypeScript step that round-trips lyrics through a validation pass before they hit the vocal layer.</li>\n          <li><strong>Deployment</strong> \u2014 Vercel for the frontend with auto-deploy on push; Python service runs on its own infrastructure.</li>\n        </ul>\n      </div>\n\n      <div class=\"iframe-wrap reveal\">\n        <div class=\"iframe-bar\"><div class=\"dots\"><span></span><span></span><span></span></div>music-gen-ai-blue.vercel.app</div>\n        <iframe src=\"https://music-gen-ai-blue.vercel.app/\" loading=\"lazy\" title=\"MusicGenAI live preview\"></iframe>\n      </div>\n    </div>\n  </section>\n\n  <!-- PROJECT: AI TELESUITE -->\n  <section class=\"view\" id=\"view-project-telesuite\">\n    <div class=\"container\">\n      <a class=\"back-link\" href=\"#projects\" data-view=\"projects\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"/><polyline points=\"12 19 5 12 12 5\"/></svg>\n        All side projects\n      </a>\n      <div class=\"project-hero reveal\">\n        <div class=\"eyebrow\">AI Workflow \u00b7 Sales Ops</div>\n        <h1 class=\"display-lg\">AI <em>TeleSuite</em></h1>\n        <p class=\"quote\">\"The same telesuite playbook I shipped at ET \u2014 packaged for solo operators and small teams.\"</p>\n        <div class=\"project-meta\">\n          <div><span class=\"label\">Role</span><span>Founder \u00b7 Designer \u00b7 Engineer</span></div>\n          <div><span class=\"label\">Status</span><span>Live</span></div>\n          <div><span class=\"label\">Stack</span><span>LLMs \u00b7 Real-time transcription</span></div>\n        </div>\n        <div class=\"project-cta\">\n          <a href=\"https://ai-tele-suite.vercel.app/\" target=\"_blank\" rel=\"noopener\" class=\"btn primary\">Open live app \u2197</a>\n        </div>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">The pitch</div>\n        <h2>What it is</h2>\n        <p>AI TeleSuite is a real-time AI sales co-pilot. It transcribes a sales call as it happens, scores the pitch against quality criteria, and surfaces conversion suggestions live to the operator. Think of it as a quiet voice in the seller's ear, trained on what good looks like.</p>\n        <p>This is the consumer-facing companion to a product I built at Times Internet \u2014 same philosophy, smaller surface area, designed for individual sellers and tiny teams rather than enterprise sales floors.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Origin</div>\n        <h2>Why I built it</h2>\n        <p>At ET, the original telesuite was for our high-volume assisted-sales channel \u2014 dozens of agents, structured scripts, mature ops layer. It worked beautifully and made the difference in scaling Assisted Sales from \u20b915L to \u20b980L MRR.</p>\n        <p>But the same problem exists everywhere outside enterprise sales floors: a freelancer running calls all day, a founder doing demos, a small startup with three SDRs. They have <em>no</em> coaching layer. Every call is solo, every mistake invisible, every win unrepeatable. AI TeleSuite is what happens when you take the enterprise version and strip it down to one user.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Problem it solves</div>\n        <h2>What's broken without it</h2>\n        <ul>\n          <li><strong>Solo sellers have no quality feedback loop.</strong> Big sales orgs have call review meetings; freelancers have a hopeful inbox.</li>\n          <li><strong>Pitch consistency is invisible.</strong> Without recording and scoring, you don't know whether your fifth call of the day is as sharp as your first.</li>\n          <li><strong>Wins are unrepeatable.</strong> If you don't know which sentences moved the needle, you can't double down on them.</li>\n          <li><strong>Coaching at scale is expensive.</strong> A senior sales coach costs $200/hour. AI can do the first 80% for almost nothing.</li>\n        </ul>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">What's next</div>\n        <h2>The roadmap in my head</h2>\n        <p>The next step is integrations \u2014 pull objection responses from your CRM, post-call summaries to your pipeline, and a coaching dashboard that surfaces patterns across a seller's last 50 calls. The vision is a quiet, persistent improvement engine that runs in the background while you sell.</p>\n      </div>\n\n      <div class=\"iframe-wrap reveal\">\n        <div class=\"iframe-bar\"><div class=\"dots\"><span></span><span></span><span></span></div>ai-tele-suite.vercel.app</div>\n        <iframe src=\"https://ai-tele-suite.vercel.app/\" loading=\"lazy\" title=\"AI TeleSuite live preview\"></iframe>\n      </div>\n    </div>\n  </section>\n\n  <!-- PROJECT: TH+ LIFEENGINE -->\n  <section class=\"view\" id=\"view-project-lifeengine\">\n    <div class=\"container\">\n      <a class=\"back-link\" href=\"#projects\" data-view=\"projects\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"/><polyline points=\"12 19 5 12 12 5\"/></svg>\n        All side projects\n      </a>\n      <div class=\"project-hero reveal\">\n        <div class=\"eyebrow\">AI Wellness \u00b7 Personalised planning</div>\n        <h1 class=\"display-lg\">TH+ <em>LifeEngine</em></h1>\n        <p class=\"quote\">\"Personalised health booster \u2014 AI that turns generic wellness advice into a daily plan tied to your goals.\"</p>\n        <div class=\"project-meta\">\n          <div><span class=\"label\">Role</span><span>PM \u00b7 Designer \u00b7 Builder</span></div>\n          <div><span class=\"label\">Status</span><span>Live \u00b7 Login-gated</span></div>\n          <div><span class=\"label\">Stack</span><span>AI Planning \u00b7 Web</span></div>\n        </div>\n        <div class=\"project-cta\">\n          <a href=\"https://th-life-engine.vercel.app/\" target=\"_blank\" rel=\"noopener\" class=\"btn primary\">Open live app \u2197</a>\n        </div>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">The pitch</div>\n        <h2>What it is</h2>\n        <p>TH+ LifeEngine is an AI-powered wellness planner. You tell it your goals \u2014 fitness, sleep, nutrition, stress, focus \u2014 and it builds a daily plan around them, adjusting as you log progress. It's behind a login because the version of wellness advice that actually works is personal, and personal data needs to live behind auth.</p>\n        <p>It's a private exploration of what a \"Times Health+ engine\" \u2014 a personalised companion sitting on top of the subscription product \u2014 could look like.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Origin</div>\n        <h2>Why I built it</h2>\n        <p>I shipped Times Health+ subscriptions at Times Internet \u2014 paid wellness content for Indian users. The product works, but it has the same problem every content product has: the content is one-size-fits-all, even when the user's goals aren't.</p>\n        <p>LifeEngine is my answer to that \u2014 a personalisation layer that takes the same wellness library and routes the <em>right pieces</em> to the right user on the right day. I built it as a side experiment to see whether the personalisation actually does the work I expected it to.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Problem it solves</div>\n        <h2>What's broken without it</h2>\n        <ul>\n          <li><strong>Generic wellness content underperforms.</strong> A \"drink more water\" tip means nothing if the user is actually struggling with sleep.</li>\n          <li><strong>No accountability loop.</strong> Most wellness apps tell you what to do but never check if you did it. The engine builds in light daily check-ins.</li>\n          <li><strong>Subscription churn for content products.</strong> If the content doesn't feel made for you, you'll leave. Personalisation is a retention play, not a fancy feature.</li>\n          <li><strong>The expert in your pocket.</strong> The promise of AI wellness has always been \"your own nutritionist + trainer + therapist\". This is one honest attempt at the planner layer of that.</li>\n        </ul>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">PM takeaway</div>\n        <h2>What I learned</h2>\n        <p>Building the engine end-to-end forced me to confront a question I'd been ducking at work: where does AI personalisation actually create value in a content subscription, and where does it just <em>look</em> like value? The answer turned out to be more nuanced than the PRD I'd have written before \u2014 and that's exactly why I keep building these on the side.</p>\n      </div>\n\n      <div class=\"iframe-wrap reveal\">\n        <div class=\"iframe-bar\"><div class=\"dots\"><span></span><span></span><span></span></div>th-life-engine.vercel.app</div>\n        <iframe src=\"https://th-life-engine.vercel.app/\" loading=\"lazy\" title=\"TH+ LifeEngine live preview\"></iframe>\n      </div>\n    </div>\n  </section>\n\n  <!-- PROJECT: THE THIRD EYE -->\n  <section class=\"view\" id=\"view-project-thirdeye\">\n    <div class=\"container\">\n      <a class=\"back-link\" href=\"#projects\" data-view=\"projects\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"/><polyline points=\"12 19 5 12 12 5\"/></svg>\n        All side projects\n      </a>\n      <div class=\"project-hero reveal\">\n        <div class=\"eyebrow\">AI OS \u00b7 Personal \u00b7 Agent-orchestrated</div>\n        <h1 class=\"display-lg\">The Third <em>Eye</em></h1>\n        <p class=\"quote\">\"A personal operating system, run by agents \u2014 Jarvis on the inside, calm UI on the outside.\"</p>\n        <div class=\"project-meta\">\n          <div><span class=\"label\">Role</span><span>Architect \u00b7 Builder</span></div>\n          <div><span class=\"label\">Status</span><span>Live \u00b7 Self-hosted</span></div>\n          <div><span class=\"label\">Stack</span><span>Next.js \u00b7 FastAPI \u00b7 Postgres+pgvector \u00b7 Gemini</span></div>\n        </div>\n        <div class=\"project-cta\">\n          <a href=\"https://the-third-eye-anchit.vercel.app/\" target=\"_blank\" rel=\"noopener\" class=\"btn primary\">Open live app \u2197</a>\n        </div>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">The pitch</div>\n        <h2>What it is</h2>\n        <p>The Third Eye is a personal AI operating system. One assistant, four personas \u2014 <em>JARVIS</em>, <em>FRIDAY</em>, <em>E.D.I.T.H.</em>, <em>ULTRON</em> \u2014 sharing the same toolset: tasks, notes, knowledge-base RAG, web search, weather, news, stock quotes, multi-agent parallel reasoning, translation, location-aware suggestions, calendar, reminders, voice control.</p>\n        <p>The agents disagree about tone; they agree about answers. You pick the personality, you get the same capabilities underneath.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Origin</div>\n        <h2>Why I built it</h2>\n        <p>Every productivity tool I tried at work \u2014 Notion, ChatGPT, custom GPTs \u2014 solved one slice but never the whole loop: capture \u2192 memory \u2192 recall \u2192 action \u2192 review. So I built the loop. It runs on my own infrastructure, learns my context, and never asks me to copy-paste between tabs.</p>\n        <p>The Iron Man personas weren't a gimmick \u2014 they were a forcing function. If JARVIS, FRIDAY, EDITH and ULTRON all had to share the same backend, I had to design the backend right.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Problem it solves</div>\n        <h2>What's broken without it</h2>\n        <ul>\n          <li><strong>Tool sprawl with no memory.</strong> ChatGPT forgets, Notion doesn't reason, calendar apps don't notice patterns. Third Eye stitches them.</li>\n          <li><strong>One-time consent.</strong> Mic, location, camera, notifications \u2014 granted once via a single dialog, never asked again unless reset.</li>\n          <li><strong>Voice that actually works.</strong> Wake word on agent name OR \"hey/hi\", Web Speech STT with interim text, TTS matched to the active agent's persona.</li>\n          <li><strong>Multi-agent reasoning.</strong> ULTRON mode kicks off N parallel sub-agents on distinct angles of a hard question and synthesises \u2014 for strategy / pros-cons / \"should I do X\".</li>\n        </ul>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">What I'd build next</div>\n        <h2>The roadmap in my head</h2>\n        <p>Vision (Gemini multimodal on live camera, EDITH-style), wake-word via Porcupine for true always-on, Gmail/Calendar OAuth so the agent can read mail and book meetings, threat/anomaly scanning over inbound info, predictive routine (\"you usually do X now\").</p>\n      </div>\n\n      <div class=\"iframe-wrap reveal\">\n        <div class=\"iframe-bar\"><div class=\"dots\"><span></span><span></span><span></span></div>the-third-eye-anchit.vercel.app</div>\n        <iframe src=\"https://the-third-eye-anchit.vercel.app/\" loading=\"lazy\" title=\"The Third Eye live preview\"></iframe>\n      </div>\n    </div>\n  </section>\n\n  <!-- PROJECT: MAILER ARCHITECT -->\n  <section class=\"view\" id=\"view-project-mailer\">\n    <div class=\"container\">\n      <a class=\"back-link\" href=\"#projects\" data-view=\"projects\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"/><polyline points=\"12 19 5 12 12 5\"/></svg>\n        All side projects\n      </a>\n      <div class=\"project-hero reveal\">\n        <div class=\"eyebrow\">AI Tooling \u00b7 Marketing \u00b7 Multi-LLM cascade</div>\n        <h1 class=\"display-lg\">Mailer <em>Architect</em></h1>\n        <p class=\"quote\">\"Brief in. Production-grade HTML email out. Six LLMs trading off when one runs out.\"</p>\n        <div class=\"project-meta\">\n          <div><span class=\"label\">Role</span><span>Architect \u00b7 Builder</span></div>\n          <div><span class=\"label\">Status</span><span>Live \u00b7 Used at Vahdam</span></div>\n          <div><span class=\"label\">Stack</span><span>Vercel Functions \u00b7 OpenAI \u00b7 Anthropic \u00b7 Gemini \u00b7 xAI \u00b7 Groq \u00b7 Cerebras</span></div>\n        </div>\n        <div class=\"project-cta\">\n          <a href=\"https://marketing-mailers-html-architect.vercel.app/\" target=\"_blank\" rel=\"noopener\" class=\"btn primary\">Open live app \u2197</a>\n        </div>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">The pitch</div>\n        <h2>What it is</h2>\n        <p>Mailer Architect turns a one-line campaign brief into a fully designed HTML email \u2014 copy, product picks from the live Shopify catalog, hero image, layout, subject line. A six-tier LLM cascade handles failover: OpenAI \u2192 Anthropic \u2192 Gemini \u2192 xAI \u2192 Groq \u2192 Cerebras. When one provider exhausts quota, the next takes over inside the same request.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Origin</div>\n        <h2>Why I built it</h2>\n        <p>Marketing teams at Vahdam were shipping 4\u20136 campaigns a week per region. Each one cost hours of designer + copywriter time, and the cost of <em>not</em> sending was bigger than the cost of mediocre output. I wanted a tool that gives a competent first draft in under a minute and lets humans edit instead of starting from blank.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Problem it solves</div>\n        <h2>What's broken without it</h2>\n        <ul>\n          <li><strong>Catalog drift.</strong> Manual emails reference products that are sold out, mispriced, or wrong-region. Architect pulls live PDPs at generation time.</li>\n          <li><strong>LLM single-point-of-failure.</strong> OpenAI billing limit hits \u2014 your weekly campaign dies. The cascade routes around it without anyone noticing.</li>\n          <li><strong>Brand drift.</strong> Brand palette + typography are locked at the generator layer; copywriters can't accidentally introduce off-brand styling.</li>\n          <li><strong>11 layout archetypes.</strong> Hero-led, narrative, comparison, gift bundle, etc. \u2014 the AI picks the right one for the campaign type, not just one template.</li>\n        </ul>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">What I'd build next</div>\n        <h2>The roadmap in my head</h2>\n        <p>Live campaign performance dashboard, AI-generated monthly mailer calendar built from past performance, automated daily creation + send. (In flight.)</p>\n      </div>\n\n      <div class=\"iframe-wrap reveal\">\n        <div class=\"iframe-bar\"><div class=\"dots\"><span></span><span></span><span></span></div>marketing-mailers-html-architect.vercel.app</div>\n        <iframe src=\"https://marketing-mailers-html-architect.vercel.app/\" loading=\"lazy\" title=\"Mailer Architect live preview\"></iframe>\n      </div>\n    </div>\n  </section>\n\n  <!-- PROJECT: TASK TRACKER -->\n  <section class=\"view\" id=\"view-project-tasktracker\">\n    <div class=\"container\">\n      <a class=\"back-link\" href=\"#projects\" data-view=\"projects\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"/><polyline points=\"12 19 5 12 12 5\"/></svg>\n        All side projects\n      </a>\n      <div class=\"project-hero reveal\">\n        <div class=\"eyebrow\">Personal Productivity \u00b7 AI \u00b7 Local-first</div>\n        <h1 class=\"display-lg\">Task <em>Tracker</em></h1>\n        <p class=\"quote\">\"The things people ask of you don't live in one place \u2014 email, a meeting, a quick voice note. Task Tracker pulls them all onto one board so nothing slips.\"</p>\n        <div class=\"project-meta\">\n          <div><span class=\"label\">Role</span><span>Builder</span></div>\n          <div><span class=\"label\">Status</span><span>Live \u00b7 In daily use</span></div>\n          <div><span class=\"label\">What it does</span><span>Email \u00b7 meetings \u00b7 voice \u2192 tasks</span></div>\n        </div>\n        <div class=\"project-cta\">\n          <a href=\"https://personal-ai-assistant-anchit.vercel.app/\" target=\"_blank\" rel=\"noopener\" class=\"btn primary\">Open live app \u2197</a>\n        </div>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">The pitch</div>\n        <h2>What it is</h2>\n        <p>Task Tracker is a personal AI layer that reads my emails, meeting notes and voice memos, uses an LLM to pull out the actual to-dos hidden inside them, and lays them on a live Jira-style board. I can add, edit, drag between columns, filter, search and assign \u2014 so my whole task universe sits in one calm place instead of scattered across inboxes and my memory.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Why it's needed</div>\n        <h2>The problem</h2>\n        <p>Most tasks never arrive as tidy tickets. They show up mid-paragraph in an email, get mentioned once in a call, or pop into my head while talking. By the time I'd open a to-do app, the moment had passed \u2014 and things fell through. I wanted capture to be automatic, and triage to be a 10-second drag, not a chore.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">What it improves</div>\n        <h2>What changes</h2>\n        <ul>\n          <li><strong>Nothing slips.</strong> Tasks are captured from email, meetings and voice automatically, the moment they're spoken or written.</li>\n          <li><strong>Triage in seconds.</strong> A live board \u2014 To&nbsp;Do, In&nbsp;Progress, In&nbsp;Review, Done, Dropped \u2014 with drag, priority, assignees and filters.</li>\n          <li><strong>One source of truth.</strong> Every commitment in one view, sorted newest-first, searchable, shareable.</li>\n          <li><strong>Lower mental load.</strong> The system remembers, so I don't have to.</li>\n        </ul>\n      </div>\n\n      <div class=\"iframe-wrap reveal\">\n        <div class=\"iframe-bar\"><div class=\"dots\"><span></span><span></span><span></span></div>personal-ai-assistant-anchit.vercel.app</div>\n        <iframe src=\"https://personal-ai-assistant-anchit.vercel.app/\" loading=\"lazy\" title=\"Task Tracker live preview\"></iframe>\n      </div>\n    </div>\n  </section>\n\n  <!-- PROJECT: VAHDAM LIFECYCLE OS -->\n  <section class=\"view\" id=\"view-project-lifecycle\">\n    <div class=\"container\">\n      <a class=\"back-link\" href=\"#projects\" data-view=\"projects\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"/><polyline points=\"12 19 5 12 12 5\"/></svg>\n        All side projects\n      </a>\n      <div class=\"project-hero reveal\">\n        <div class=\"eyebrow\">D2C Retention \u00b7 Marketing Calendar \u00b7 Mailer Creator \u00b7 Installable PWA</div>\n        <h1 class=\"display-lg\">VAHDAM <em>Lifecycle OS</em></h1>\n        <p class=\"quote\">\"Stop guessing what to send next \u2014 one workflow from data to plan to mailers.\"</p>\n        <div class=\"project-meta\">\n          <div><span class=\"label\">Role</span><span>Architect \u00b7 Builder</span></div>\n          <div><span class=\"label\">Status</span><span>Live \u00b7 Powering the retention queue</span></div>\n          <div><span class=\"label\">Stack</span><span>Supabase \u00b7 ApexCharts \u00b7 Vercel Functions \u00b7 7-LLM Cascade \u00b7 PWA</span></div>\n        </div>\n        <div class=\"project-cta\">\n          <a href=\"https://vahdam-lifecycle-os.vercel.app/\" target=\"_blank\" rel=\"noopener\" class=\"btn primary\">Open live app \u2197</a>\n        </div>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">The pitch</div>\n        <h2>What it is</h2>\n        <p>Three tools, one workflow, one Google sign-in. Stage 1 reads your campaign + customer + order data and builds an executive-grade retention dashboard \u2014 RFM segments, cohort retention, send-time heatmaps, cross-sell affinity, all currency-aware (USD \u21c4 INR). Stage 2 turns that analysis into a 30-day marketing calendar, festival-aware across 11 markets, with cadence guards per segment. Stage 3 runs every row through the brand-locked Mailer Studio \u2014 strategy \u2192 variant \u2192 image cascade \u2192 HTML \u2014 and hands you four ready-to-ship variants per send. The whole thing installs from the address bar as a PWA.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Origin</div>\n        <h2>Why I built it</h2>\n        <p>At Vahdam, the retention workflow was three disconnected tools and a calendar nobody trusted. Analytics in one tab, a spreadsheet plan in another, the email builder in a third \u2014 every Monday started with someone reconciling, not deciding. I wanted one place where the data already knew what to send, the calendar respected segment fatigue and cultural moments, and the mailer itself was already drafted on-brand before the meeting started.</p>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">Problem it solves</div>\n        <h2>What's broken without it</h2>\n        <ul>\n          <li><strong>Disjointed stack.</strong> Dashboard, calendar and mailer normally live in three vendors with three logins. Lifecycle OS unifies them under one Google sign-in.</li>\n          <li><strong>Calendar drift.</strong> Send plans ignore segment cadence and cultural calendars. The planner enforces sends-per-week per segment and overlays a festivals dataset across 11 regions (US/UK/Global/IN/ME/AU/EU/CA/JP/SG).</li>\n          <li><strong>Mailer cold start.</strong> Every send begins from a blank brief. Each calendar row hands the Studio a pre-generated strategy + four variants (2 image, 2 text) tied to the right product/collection URL.</li>\n          <li><strong>Exec-grade exports.</strong> Colour-preserving Excel of every dashboard table plus a \"complete analysis\" workbook compiled live from the linked Supabase views \u2014 schedulable, no spreadsheet of truth.</li>\n        </ul>\n      </div>\n\n      <div class=\"project-section reveal\">\n        <div class=\"eyebrow\">What I'd build next</div>\n        <h2>The roadmap in my head</h2>\n        <p>Auto-daily send queue with a one-click \"ship the plan\" mode, anomaly detection on the retention curve, predictive cohort forecasts, and a slash-command interface so the dashboard answers \"what's UK revenue last Tuesday\" in plain English. Plus deeper hand-off into the Studio \u2014 direct image-variant render in the calendar drawer, no extra step.</p>\n      </div>\n\n      <div class=\"iframe-wrap reveal\">\n        <div class=\"iframe-bar\"><div class=\"dots\"><span></span><span></span><span></span></div>vahdam-lifecycle-os.vercel.app</div>\n        <iframe src=\"https://vahdam-lifecycle-os.vercel.app/\" loading=\"lazy\" title=\"VAHDAM Lifecycle OS live preview\"></iframe>\n      </div>\n    </div>\n  </section>\n\n  <!-- RESUME -->", "resume": "<section class=\"view\" id=\"view-resume\">\n    <div class=\"container\">\n      <div class=\"section-head reveal\">\n        <div class=\"eyebrow\">Resume \u00b7 Download or view</div>\n        <h1 class=\"display-lg\">My Resume</h1>\n        <p class=\"lede\" style=\"margin-top: 16px;\">The complete professional summary \u2014 roles, impact, skills, education. <em>The full story, on one page.</em></p>\n        <p style=\"margin-top:18px;\"><a href=\"/cyber\" target=\"_blank\ arCollapsed() {\n    try {\n      const ls = localStorage.getItem('anchit-sidebar-collapsed');\n      if (ls !== null) return ls === '1';\n    } catch {}\n    return (document.cookie.match(/(?:^|; )sb_collapsed=(\\d)/)?.[1] === '1');\n  }\n  function writeSidebarCollapsed(collapsed) {\n    try { localStorage.setItem('anchit-sidebar-collapsed', collapsed ? '1' : '0'); } catch {}\n    // 1-year same-site cookie as fallback when localStorage is purged\n    document.cookie = `sb_collapsed=${collapsed ? 1 : 0}; path=/; max-age=${60 * 60 * 24 * 365}; SameSite=Lax`;\n  }\n  if (readSidebarCollapsed()) {\n    document.body.classList.add('sidebar-collapsed');\n  }\n  const sidebarCollapseBtn = document.getElementById('sidebarCollapseBtn');\n  if (sidebarCollapseBtn) {\n    sidebarCollapseBtn.addEventListener('click', () => {\n      const collapsed = document.body.classList.toggle('sidebar-collapsed');\n      writeSidebarCollapsed(collapsed);\n      sidebarCollapseBtn.setAttribute('aria-label', collapsed ? 'Expand sidebar' : 'Collapse sidebar');\n    });\n  }\n\n  /* ============ SIDEBAR (MOBILE) ============ */\n  const sidebar = document.getElementById('sidebar');\n  const sidebarBackdrop = document.getElementById('sidebarBackdrop');\n  const sidebarToggle = document.getElementById('sidebarToggle');\n  function openSidebar() { sidebar.classList.add('open'); sidebarBackdrop.classList.add('visible'); if(sidebarToggle) sidebarToggle.setAttribute('aria-expanded','true'); }\n  function closeSidebar() { sidebar.classList.remove('open'); sidebarBackdrop.classList.remove('visible'); if(sidebarToggle) sidebarToggle.setAttribute('aria-expanded','false'); }\n  // The hamburger now TOGGLES based on current state (expand \u21c4 collapse),\n  // on every viewport \u2014 fixes the bug where tapping \u2630 while open did nothing.\n  function toggleSidebar() {\n    const onDesktop = window.matchMedia('(min-width: 861px)').matches;\n    if (onDesktop) {\n      const collapsed = document.body.classList.toggle('sidebar-collapsed');\n      try { localStorage.setItem('anchit-sidebar-collapsed', collapsed ? '1' : '0'); } catch {}\n      sidebarToggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');\n    } else {\n      if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar();\n    }\n  }\n  if (sidebarToggle) sidebarToggle.addEventListener('click', toggleSidebar);\n  sidebarBackdrop.addEventListener('click', closeSidebar);\n\n  /* ============ VIEW SWITCHING ============ */\n  const views = document.querySelectorAll('.view');\n  const navLinks = document.querySelectorAll('[data-view]');\n\n  function switchView(viewName, anchorId) {\n    if (viewName === 'schedule') { if (window.openScheduleModal) window.openScheduleModal(); return; }\n    if (!ALL_VIEWS.includes(viewName)) return;\n\n    // Animate out old view, animate in new\n    const prev = document.querySelector('.view.active');\n    if (prev && prev.id !== 'view-' + viewName) {\n      prev.classList.add('v-leave');\n      setTimeout(() => prev.classList.remove('v-leave'), 250);\n    }\n\n    views.forEach(v => {\n      const isActive = v.id === 'view-' + viewName;\n      if (isActive && !v.classList.contains('active')) v.classList.add('v-enter');\n      v.classList.toggle('active', isActive);\n      setTimeout(() => v.classList.remove('v-enter'), 450);\n    });\n\n    // Active states on sidebar nav links\n    navLinks.forEach(n => {\n      const target = n.dataset.view;\n      const isActive = target === viewName || (viewName.startsWith('project-') && target === 'projects');\n      n.classList.toggle('active', isActive);\n    });\n\n    closeSidebar();\n    if (anchorId) {\n      // Defer scroll until the view is rendered + animated in\n      requestAnimationFrame(() => {\n        const el = document.getElementById(anchorId);\n        if (el) {\n          el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n        } else {\n          window.scrollTo({ top: 0, behavior: 'instant' });\n        }\n      });\n      history.replaceState(null, '', '#' + viewName + '/' + anchorId);\n    } else {\n      window.scrollTo({ top: 0, behavior: 'instant' });\n      history.replaceState(null, '', '#' + viewName);\n    }\n    document.dispatchEvent(new CustomEvent('viewChanged', { detail: viewName }));\n\n    // Re-trigger reveals for the new view\n    requestAnimationFrame(() => observeReveals());\n  }\n\n  navLinks.forEach(n => {\n    n.addEventListener('click', (e) => {\n      e.preventDefault();\n      switchView(n.dataset.view, n.dataset.anchor);\n    });\n  });\n\n  // Hash on load \u2014 supports #view or #view/anchor\n  const hash = window.location.hash.replace('#', '');\n  if (hash) {\n    const [viewPart, anchorPart] = hash.split('/');\n    switchView(viewPart, anchorPart || undefined);\n  }\n\n  /* ============ REVEAL ON SCROLL \u2014 defined below ============ */\n  let revealObserver;\n\n  /* ============ CHAT ============ */\n  const KB = [\n    { keywords: ['hi','hello','hey','sup','yo','namaste','good morning','good evening','howdy'],\n      response: \"Hey \u2014 glad you're here. I'm Anchit. Ask me anything: my <a data-nav='experience'>work</a>, my <a data-nav='projects'>side builds</a>, how I think about product, or what I'm solving right now at Vahdam.\",\n      nextChips: [\"What do you do?\",\"Your biggest career win?\",\"What are you building?\",\"Why product over engineering?\"] },\n    { keywords: ['who','about','tell me about you','yourself','background','bio','introduce','what do you do','describe'],\n      response: \"I'm Anchit Tandon \u2014 AGM, Product at Vahdam India, ex-Times Internet. Five-plus years in B2C consumer tech: D2C growth, subscriptions, content, events. Started as a backend engineer, moved to product in 2022 because I got obsessed with <em>why</em> things were being built, not just how. I think in systems, ship in experiments, and build AI side projects on weekends because I can't sit still. <a data-nav='experience'>Full story \u2192</a>\",\n      nextChips: [\"Your biggest career win?\",\"Why switch to product?\",\"Tell me about your side builds\",\"Hardest problem right now?\"] },\n    { keywords: ['role','title','current','doing now','job','vahdam','work now','position'],\n      response: \"Vahdam India is a premium, home-grown wellness brand that sources fresh Indian teas, spices, and superfoods directly from estates and exports them to a global audience (primarily US, UK, and Europe). As AGM of Product Management here since April 2026, I drive direct-to-consumer (D2C) growth across these global markets. My role focuses on optimizing the entire digital funnel \u2014 balancing acquisition, retention, CRM, and conversion rate optimization (CRO) to scale global revenue profitably. Before this, I spent nearly four years at Times Internet moving from APM to Senior PM.\",\n      nextChips: [\"What's hardest at Vahdam?\",\"Tell me about Times Internet\",\"Show me your work\",\"How do I reach you?\"] },\n    { keywords: ['hardest','challenge','hard','difficult','solving','problem','struggle'],\n      response: \"Right now at Vahdam India \u2014 a global D2C wellness and tea brand \u2014 my main challenge is driving sustainable growth across global markets. That involves coordinating customer acquisition, retention, and conversion rate optimization (CRO) simultaneously. For instance, I led cross-functional experiments that lifted our product rating from 2.4 to 4.0. The real skill is prioritizing the highest-impact funnel opportunities.\",\n      nextChips: [\"Show me your growth wins\",\"Your product philosophy?\",\"Tell me about your builds\",\"How do I reach you?\"] },\n    { keywords: ['et markets','markets','revamp','finance','stocks'],\n      response: \"ET Markets is the stock market and financial tracking arm of The Economic Times (India's leading business daily), serving as one of the country's highest-traffic financial platforms with real-time market data. I led the end-to-end product revamp of ET Markets across Web, mobile Web, Android, and iOS. By restructuring the information architecture and testing relentlessly, we achieved a +27% boost in user engagement, +25% in DAUs, and added \u20b93Cr+ in incremental ARR. <a data-nav='experience'>Full work view \u2192</a>\",\n      nextChips: [\"Tell me about Assisted Sales\",\"What about Times Health+?\",\"Your engineering background?\",\"Show me a side build\"] },\n    { keywords: ['prime','assisted sales','sales','subscription','conversion','roi','growth','biggest','win','proudest','proud'],\n      response: \"ET Prime is the premium, member-only business subscription service of The Economic Times, offering high-quality, ad-free investigative journalism and business analysis. I led growth for ET Prime's Assisted Sales channel, scaling it 5\u00d7 from \u20b915L to \u20b980L MRR in six months. To achieve this, I built an AI-powered telesuite featuring real-time call transcription, pitch scoring, and conversion assists, which boosted our team's sales conversion and delivered over 400% ROI. This work won me the Times Internet Team Award.\",\n      nextChips: [\"What's the AI telesuite?\",\"Your product philosophy?\",\"What are you building now?\",\"How do I reach you?\"] },\n    { keywords: ['marathon','event','running','half','0 to 1','zero to one','zero-to-one'],\n      response: \"The Times Internet Half Marathon is a major consumer sports IP and fitness event designed to bring running communities together. I built and launched this event from absolute zero-to-one, managing the discovery platforms, registration and ticket booking funnels, participant acquisition campaigns, and coordinating on-ground runner operations. At Vahdam I apply similar zero-to-one thinking but to D2C growth across global markets.\",\n      nextChips: [\"Show me your other work\",\"Tell me about side builds\",\"Your approach to product?\",\"How do I reach you?\"] },\n    { keywords: ['health','wellness','plus','health+'],\n      response: \"Times Health+ is a premium, paid wellness subscription program launched by Times Internet, offering curated health content, plans, and digital tools. I launched this product from scratch, designing the freemium-to-paid subscription journeys, running pricing experiments, and leading monetization. By tuning the value-to-friction ratio, we successfully cracked subscription revenue in a market historically accustomed to free content.\",\n      nextChips: [\"Tell me about LifeEngine\",\"What about ET Markets?\",\"Tell me about Assisted Sales\",\"How do I reach you?\"] },\n    { keywords: ['side','project','projects','build','builds','weekend','personal','ship','github','vercel'],\n      response: \"Four live side projects, all built end-to-end on weekends and evenings. Curiosity starts the project, ambition keeps it alive, restlessness prevents me from staying satisfied. <a data-nav='projects'>See them all \u2192</a> Or ask about a specific one \u2014 Hey Yaara, MusicGenAI, AI TeleSuite, LifeEngine, or Jarvis.\",\n      nextChips: [\"Tell me about Hey Yaara\",\"Tell me about Jarvis\",\"Tell me about MusicGenAI\",\"Why build on weekends?\"] },\n    { keywords: ['hey yaara','yaara','elderly','companion'],\n      response: \"Hey Yaara is an AI-powered voice companion designed specifically for elderly users to combat loneliness and assist with daily queries through a simple voice-first interface. I designed and built this PWA from scratch to remove all screen-based friction \u2014 users simply tap one button to talk and one to stop. Everything from transcription to speech response is handled entirely by voice. <a data-nav='project-yaara'>Full deep dive \u2192</a>\",\n      nextChips: [\"Open Hey Yaara page\",\"Tell me about MusicGenAI\",\"Why build side projects?\",\"Show me your day job\"] },\n    { keywords: ['music','musicgen','song'],\n      response: \"MusicGenAI is an AI-powered music generation web app that composes complete songs \u2014 including lyrics, vocals, and instruments \u2014 from simple text prompts. Unlike typical 'black box' music generators, MusicGenAI exposes every stage of the generation pipeline, allowing users to inspect and debug lyrics or vocal tracks when they drift. I built this end-to-end using a React/TypeScript frontend and a dedicated Python audio synthesis microservice. <a data-nav='project-music'>Full deep dive \u2192</a>\",\n      nextChips: [\"Open MusicGenAI page\",\"Tell me about AI TeleSuite\",\"Your tech stack?\",\"Show me your day job\"] },\n    { keywords: ['telesuite','ai tele','tele suite'],\n      response: \"AI TeleSuite is a real-time sales intelligence platform that helps solo operators and small sales teams close deals by providing live call transcription, automated pitch scoring, and real-time conversion recommendations. I packaged the same playbook and technology I built for ET Prime's enterprise growth into this lightweight, accessible product to act as a real-time assistant for independent sellers. <a data-nav='project-telesuite'>Full deep dive \u2192</a>\",\n      nextChips: [\"Open TeleSuite page\",\"Tell me about ET Prime\",\"Tell me about LifeEngine\",\"How do I reach you?\"] },\n    { keywords: ['lifeengine','life engine','th+','th plus'],\n      response: \"TH+ LifeEngine is a secure, personalized AI wellness platform that transforms generic health advice into structured, actionable daily routines tailored to an individual's specific health goals. I built this login-gated, privacy-first platform to take the subscription-led wellness models I developed at Times Health+ to the next level, offering deep personalization. <a data-nav='project-lifeengine'>Full deep dive \u2192</a>\",\n      nextChips: [\"Open LifeEngine page\",\"Tell me about Times Health+\",\"Tell me about other builds\",\"How do I reach you?\"] },\n    { keywords: ['jarvis','ai os','operating system','vision','dream project','most attached'],\n      response: \"Jarvis is a proactive, context-aware AI operating system designed to act as an intelligent agent across multiple devices and workflows, rather than a simple conversational chatbot. I initiated this project to build a truly integrated AI workspace that understands context across apps and files. It's a long-term vision that I'm building step-by-step, and it is the side build I'm most passionate about.\",\n      nextChips: [\"Why build on weekends?\",\"Tell me about Hey Yaara\",\"Your AI stack?\",\"Show me your day job\"] },\n    { keywords: ['why build','why weekend','why side','motivation','drive','restless'],\n      response: \"A mix of curiosity, ambition, and restlessness. Curiosity starts the project. Ambition keeps it alive. Restlessness prevents me from staying satisfied with the status quo. I enjoy building things that don't exist yet and testing ideas fast. The side projects aren't hobbies \u2014 they're how I stress-test ideas I can't run inside a company.\",\n      nextChips: [\"Tell me about Jarvis\",\"Show me your builds\",\"Your product philosophy?\",\"How do I reach you?\"] },\n    { keywords: ['skill','skills','good at','specialty','specialties','expertise','strength','capable'],\n      response: \"Sharpest edges: growth funnels and conversion, zero-to-one product development, subscriptions and monetisation, experimentation and A/B testing, AI workflows. I think in funnels and ship in experiments. The common thread: can this be automated, measured, or scaled?\",\n      nextChips: [\"Show me a 0\u21921 example\",\"Show me a growth win\",\"Tell me about your AI work\",\"How do I reach you?\"] },\n    { keywords: ['engineer','engineering','tech','code','backend','coding','developer','vit','computer science','engineering background'],\n      response: \"B.Tech CSE from VIT Vellore (2016\u20132020). Started at Tuple Technologies \u2014 backend services, consumer apps, became Product Owner of a live sports commentary product. Then Citymall \u2014 backend and da wish\" sound (WebAudio, no asset) ----\n  let _ac = null;\n  function playSwish() {\n    try {\n      _ac = _ac || new (window.AudioContext || window.webkitAudioContext)();\n      if (_ac.state === 'suspended') _ac.resume();\n      const t = _ac.currentTime;\n      const o = _ac.createOscillator(), g = _ac.createGain();\n      o.type = 'sine'; o.frequency.setValueAtTime(540, t); o.frequency.exponentialRampToValueAtTime(1180, t + 0.12);\n      g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(0.16, t + 0.03); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);\n      o.connect(g).connect(_ac.destination); o.start(t); o.stop(t + 0.24);\n    } catch {}\n  }\n\n  function sendCurrent() {\n    const v = chatInput.value;\n    chatInput.value = '';\n    if (v.trim()) playSwish();\n    handleMessage(v);\n  }\n  chatSend.addEventListener('click', sendCurrent);\n  chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendCurrent(); });\n\n  // ---- In-chat mic: speak \u2192 transcribe into the input \u2192 auto-send ----\n  (function(){\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    const micBtn = document.getElementById('chatMic');\n    if (!micBtn) return;\n    if (!SR) { micBtn.style.display = 'none'; return; }\n    let rec = null, on = false;\n    micBtn.addEventListener('click', () => {\n      if (on) { try { rec && rec.stop(); } catch {} return; }\n      try {\n        if (window.speechSynthesis) window.speechSynthesis.cancel();   // pause narration while user speaks\n        if (cloneAudio) { try { cloneAudio.pause(); } catch {} }\n        rec = new SR(); rec.lang = 'en-IN'; rec.interimResults = true; rec.continuous = false;\n        micBtn.classList.add('listening'); on = true;\n        rec.onresult = (e) => {\n          let txt = ''; for (let i=0;i<e.results.length;i++) txt += e.results[i][0].transcript;\n          chatInput.value = txt;\n          if (e.results[e.results.length-1].isFinal) { re
