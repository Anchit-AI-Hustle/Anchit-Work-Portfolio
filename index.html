tn = document.getElementById('anpMute');\n    muteBtn?.addEventListener('click', () => { audioMuted = !audioMuted; applyMute(); muteBtn.title = audioMuted ? 'Unmute' : 'Mute'; });\n\n    function stopAllPlayback() {\n      stopPageAudio();\n      window.speechSynthesis.cancel();\n      stopHighlighting();\n      audioModeEnabled = false;\n      hideIndicator();\n      nudge?.classList.remove('playing', 'paused');\n      stickyBtn?.classList.remove('playing', 'paused');\n      stopProgressBar();\n    }\n\n    stopBtn?.addEventListener('click', stopAllPlayback);\n\n    dismissBtn?.addEventListener('click', () => { nudge?.classList.add('dismissed'); });\n\n    /* Sticky listen button \u2014 play/pause/stop */\n    const stickyBtn = document.getElementById('topBarListenBtn');\n    const stickyStop = document.getElementById('topBarStopBtn');\n    stickyBtn?.addEventListener('click', (e) => {\n      if (e.target.closest('.listen-stop')) return; // handled below\n      if (stickyBtn.classList.contains('playing')) {\n        // Pause\n        if (pageAudio) { try { pageAudio.pause(); } catch {} } else { window.speechSynthesis.pause(); }\n        stickyBtn.classList.remove('playing');\n        stickyBtn.classList.add('paused');\n        clearInterval(progressTimer);\n      } else if (stickyBtn.classList.contains('paused')) {\n        // Resume\n        if (pageAudio) { try { pageAudio.play(); } catch {} } else { window.speechSynthesis.resume(); }\n        stickyBtn.classList.remove('paused');\n        stickyBtn.classList.add('playing');\n      } else {\n        // Play\n        audioModeEnabled = true;\n        const activeEl = document.querySelector('.view.active');\n        const vName = activeEl ? activeEl.id.replace('view-', '') : 'home';\n        trySpeak(vName);\n      }\n    });\n    stickyStop?.addEventListener('click', (e) => {\n      e.stopPropagation();\n      stopAllPlayback();\n    });\n\n    /* Hero \"Hear this from me\" button */\n    const heroListen = document.getElementById('heroListenBtn');\n    heroListen?.addEventListener('click', () => {\n      audioModeEnabled = true;\n      trySpeak('home');\n    });\n\n    document.addEventListener('viewChanged', (e) => { if (audioModeEnabled) trySpeak(e.detail); });\n\n    /* ---- Voice interrupt via SpeechRecognition ---- */\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    if (!SR) return;\n\n    const card = document.createElement('div');\n    card.className = 'voice-interrupt-card';\n    card.innerHTML = '<div class=\"vic-header\"><span class=\"vic-label\">&#9679; You asked</span><button class=\"vic-close\" aria-label=\"Dismiss\">&#x2715;</button></div><div class=\"vic-question\"></div><div class=\"vic-response\"></div><div class=\"vic-actions\"><button class=\"vic-continue\">Continue narration &#9654;</button><button class=\"vic-dismiss\">Skip, thanks</button></div>';\n    document.body.appendChild(card);\n\n    function showCard(question, responseHtml) {\n      card.querySelector('.vic-question').textContent = '\"' + question + '\"';\n      card.querySelector('.vic-response').innerHTML = responseHtml;\n      card.querySelectorAll('[data-nav]').forEach(a => {\n        a.addEventListener('click', ev => { ev.preventDefault(); card.classList.remove('active'); switchView(a.dataset.nav); });\n      });\n      card.classList.add('active');\n    }\n    function dismissCard() { card.classList.remove('active'); }\n    card.querySelector('.vic-close').addEventListener('click', dismissCard);\n    card.querySelector('.vic-dismiss').addEventListener('click', dismissCard);\n    card.querySelector('.vic-continue').addEventListener('click', () => {\n      dismissCard();\n      if (audioModeEnabled) { if (pageAudio) { try { pageAudio.play(); } catch {} } else { window.speechSynthesis.resume(); } setPlayerState(true); }\n    });\n\n    let rec = null, recognizing = false;\n    function startRec() {\n      if (recognizing) return;\n      try {\n        rec = new SR(); rec.continuous = false; rec.interimResults = false; rec.lang = 'en-IN';\n        rec.onresult = (e) => {\n          if (!e.results[0]?.isFinal) return;\n          const q = (e.results[0][0].transcript || '').trim();\n          if (!q || q.length < 2) return;\n          if (pageAudio) { try { pageAudio.pause(); } catch {} } else { window.speechSynthesis.pause(); }\n          if (fill && utterDuration) { const pct = Math.min(((Date.now()-utterStart)/utterDuration)*100,99); fill.style.transition='none'; fill.style.width=pct+'%'; }\n          clearInterval(progressTimer); setPlayerState(false);\n          const match = findMatch(q);\n          const resp = match ? match.response : 'That\\'s a thoughtful question \u2014 I\\'d love to give it the space it deserves. <a data-nav=\"home\">Ask me in the chat</a> and I\\'ll walk you through it properly.';\n          \n          const isChat = document.getElementById('view-chat')?.classList.contains('active');\n          if (isChat) {\n            handleMessage(q);\n          } else {\n            showCard(q, resp);\n          }\n        };\n        rec.onend = () => { recognizing = false; if (audioModeEnabled && window.speechSynthesis.speaking) setTimeout(startRec, 300); };\n        rec.onerror = (ev) => { recognizing = false; if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') rec = null; };\n        rec.start(); recognizing = true;\n      } catch (err) { recognizing = false; }\n    }\n    function stopRec() { recognizing = false; if (rec) { try { rec.stop(); } catch (e) {} } }\n\n    playBtn?.addEventListener('click', () => { setTimeout(startRec, 1200); }, { capture: true });\n    document.addEventListener('viewChanged', () => { if (audioModeEnabled) setTimeout(startRec, 1200); });\n    stopBtn?.addEventListener('click', stopRec, { capture: true });\n  })();\n\n  /* ============ SCROLL PROGRESS BAR ============ */\n  (function() {\n    const bar = document.getElementById('scrollProgress');\n    if (!bar) return;\n    function update() {\n      const scrolled = window.scrollY;\n      const total = document.body.scrollHeight - window.innerHeight;\n      bar.style.width = (total > 0 ? Math.min(scrolled / total, 1) * 100 : 0) + '%';\n    }\n    window.addEventListener('scroll', update, { passive: true });\n    document.addEventListener('viewChanged', () => { bar.style.width = '0'; });\n  })();\n\n  /* floating year removed \u2014 phase separators already show the date context */\n\n  /* ============ ENHANCED REVEAL OBSERVER ============ */\n  function observeReveals() {\n    if (revealObserver) revealObserver.disconnect();\n    revealObserver = new IntersectionObserver((entries) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          entry.target.classList.add('in');\n          revealObserver.unobserve(entry.target);\n        }\n      });\n    }, { threshold: 0.1, rootMargin: '0px 0px -32px 0px' });\n    const sel = '.view.active .reveal, .view.active .reveal-stagger, .view.active .reveal-left, .view.active .reveal-right, .view.active .reveal-scale';\n    document.querySelectorAll(sel).forEach(el => {\n      if (!el.classList.contains('in')) revealObserver.observe(el);\n    });\n  }\n\n  observeReveals();\n\n  /* ============ SERVICE WORKER ============ */\n  if ('serviceWorker' in navigator) {\n    window.addEventListener('load', () => {\n      navigator.serviceWorker.register('sw.js').catch(() => {});\n    });\n  }\n<\/script>\n\n<!-- \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Schedule-a-call modal (Google Meet invite) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->\n<!-- ============ FLOATING \"TALK TO ME\" CHAT FAB ============ -->\n<button id=\"chatFab\" data-view=\"chat\" aria-label=\"Chat with Anchit\" title=\"Chat with Anchit\"\n  style=\"position:fixed;right:20px;bottom:24px;z-index:9997;display:inline-flex;align-items:center;gap:10px;background:var(--primary,#ff4d1f);color:#fff;border:0;border-radius:999px;padding:14px 20px 14px 16px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 10px 30px rgba(255,77,31,.4);animation:chatFabPulse 2.6s ease-in-out infinite;\">\n  <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"/></svg>\n  <span class=\"cf-label\">Talk to me</span>\n</button>\n<style>\n  @keyframes chatFabPulse{0%,100%{box-shadow:0 10px 30px rgba(255,77,31,.4)}50%{box-shadow:0 10px 38px rgba(255,77,31,.62)}}\n  #chatFab:hover{filter:brightness(1.06);transform:translateY(-1px)}\n  @media(max-width:560px){#chatFab .cf-label{display:none}#chatFab{padding:14px;right:16px;bottom:18px}}\n  body.view-chat #chatFab{display:none}\n</style>\n<script>\n  (function(){\n    var f=document.getElementById('chatFab');\n    if(f)f.addEventListener('click',function(){\n      // Trigger the already-wired sidebar \"Chat\" item (querySelectorAll ran before this FAB existed).\n      var link=document.querySelector('.sidebar-item[data-view=\"chat\"]')||document.querySelector('[data-view=\"chat\"]:not(#chatFab)');\n      if(link){ link.click(); }\n      else { location.hash='#chat'; }\n    });\n    document.addEventListener('viewChanged',function(e){ document.body.classList.toggle('view-chat', e.detail==='chat'); });\n  })();\n<\/script>\n\n<!-- ============ VIEW SWITCHER HAS BEEN MOVED TO TOP BAR ============ -->\n<script>\n(function(){\n  var KEY='anchit-portfolio-view';\n  function go(v){ try{localStorage.setItem(KEY,v);}catch(e){} if(v==='cyber'){ location.href='/cyber'; } }\n  // first-visit chooser\n  var chosen=null; try{chosen=localStorage.getItem(KEY);}catch(e){}\n  if(!chosen){\n    try{localStorage.setItem(KEY,'simple');}catch(e){}\n  }\n  var sb=document.getElementById('sidebarViewToggle');\n  if(sb) sb.onclick=function(){ go('nexus'); };\n  \n  var ts=document.getElementById('topBarViewSelect');\n  if(ts) {\n    ts.addEventListener('change', function(e) {\n      if(e.target.value === 'cyber') go('cyber');\n      else if(e.target.value === 'nexus') go('nexus');\n    });\n  }\n})();\n<\/script>\n\n<div id=\"schedModal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"schedTitle\" style=\"position:fixed;inset:0;z-index:99999;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.62);backdrop-filter:blur(6px);\">\n  <div style=\"max-width:460px;width:100%;max-height:90vh;overflow-y:auto;background:var(--bg-elev,#fff);border:1px solid var(--rule,#e5dcc7);border-radius:18px;padding:24px 22px 26px;font-family:inherit;box-shadow:0 30px 80px rgba(0,0,0,.4);\">\n    <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary,#ff4d1f);\">Let's talk</div>\n        <h2 id=\"schedTitle\" style=\"font-size:22px;margin-top:6px;color:var(--ink,#161312);\">Book a 15-min Google Meet</h2>\n      </div>\n      <button type=\"button\" id=\"schedClose\" aria-label=\"Close\" style=\"background:none;border:0;color:var(--ink-mute,#a39e94);font-size:26px;line-height:1;cursor:pointer;\">\u00d7</button>\n    </div>\n    <p style=\"color:var(--ink-dim,#5a554e);font-size:13.5px;line-height:1.6;margin-bottom:18px;\">Pick a time and add your details. You'll get a Google Calendar invite with a Meet link \u2014 and so will I. I'll confirm on WhatsApp too.</p>\n    <form id=\"schedForm\" novalidate>\n      <label class=\"sf-l\">Your name</label>\n      <input id=\"sf-name\" class=\"sf-i\" type=\"text\" autocomplete=\"name\" placeholder=\"Jane Doe\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n        <div><label class=\"sf-l\">Designation</label><input id=\"sf-role\" class=\"sf-i\" type=\"text\" autocomplete=\"organization-title\" placeholder=\"Product Manager\"></div>\n        <div><label class=\"sf-l\">Company</label><input id=\"sf-company\" class=\"sf-i\" type=\"text\" autocomplete=\"organization\" placeholder=\"Acme Inc.\"></div>\n      </div>\n      <label class=\"sf-l\">Your email</label>\n      <input id=\"sf-email\" class=\"sf-i\" type=\"email\" autocomplete=\"email\" placeholder=\"jane@company.com\">\n      <label class=\"sf-l\">Your mobile (WhatsApp)</label>\n      <input id=\"sf-phone\" class=\"sf-i\" type=\"tel\" autocomplete=\"tel\" placeholder=\"+91 98765 43210\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n        <div><label class=\"sf-l\">Date</label><input id=\"sf-date\" class=\"sf-i\" type=\"date\" style=\"color-scheme:light;\"></div>\n        <div><label class=\"sf-l\">Time</label><input id=\"sf-time\" class=\"sf-i\" type=\"time\" style=\"color-scheme:light;\"></div>\n      </div>\n      <p style=\"font-size:11.5px;color:var(--ink-mute,#a39e94);margin:4px 0 0;line-height:1.5;\">I'll confirm the slot is free and accept the invite \u2014 if it clashes, I'll suggest the nearest open time.</p>\n      <div id=\"sf-err\" style=\"color:#d92d20;font-size:12.5px;margin-top:10px;display:none;\"></div>\n      <button type=\"submit\" style=\"width:100%;margin-top:18px;background:var(--primary,#ff4d1f);color:#fff;border:0;border-radius:11px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;\">Create the invite \u2192</button>\n    </form>\n    <div id=\"sf-done\" style=\"display:none;\">\n      <p style=\"color:var(--ink,#161312);font-size:14px;line-height:1.6;margin-bottom:16px;\">Two quick steps to lock it in:</p>\n      <a id=\"sf-gcal\" href=\"#\" target=\"_blank\" rel=\"noopener\" class=\"sf-step\">\ud83d\udcc5 <span><b>Add to Google Calendar</b> \u2014 invites you + me, with a Meet link</span></a>\n      <a id=\"sf-wa\" href=\"#\" target=\"_blank\" rel=\"noopener\" class=\"sf-step\">\ud83d\udcac <span><b>Confirm on WhatsApp</b> \u2014 sends me the details</span></a>\n      <button type=\"button\" id=\"sf-again\" style=\"margin-top:14px;background:none;border:0;color:var(--ink-dim,#5a554e);font-size:12.5px;cursor:pointer;text-decoration:underline;\">\u2190 Change details</button>\n    </div>\n  </div>\n</div>\n<style>\n  #schedModal .sf-l{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-dim,#5a554e);margin:0 0 5px;font-weight:600;}\n  #schedModal .sf-i{width:100%;background:var(--bg,#fbf5ec);border:1px solid var(--rule,#e5dcc7);border-radius:10px;color:var(--ink,#161312);padding:11px 13px;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px;}\n  #schedModal .sf-i:focus{border-color:var(--primary,#ff4d1f);}\n  #schedModal .sf-step{display:flex;align-items:center;gap:10px;background:var(--bg,#fbf5ec);border:1px solid var(--rule,#e5dcc7);border-radius:11px;padding:13px 15px;margin-bottom:10px;text-decoration:none;color:var(--ink,#161312);font-size:13.5px;}\n  #schedModal .sf-step:hover{border-color:var(--primary,#ff4d1f);}\n</style>\n<script>\n(function(){\n  var HOST_EMAIL=\"anchit.tandon@gmail.com\", HOST_WA=\"919873945238\";\n  var modal=document.getElementById('schedModal'), form=document.getElementById('schedForm'), done=document.getElementById('sf-done'), err=document.getElementById('sf-err');\n  window.openScheduleModal=function(){\n    form.style.display=''; done.style.display='none'; err.style.display='none';\n    var d=document.getElementById('sf-date'); if(d){var t=new Date(Date.now()+864e5);d.value=t.toISOString().slice(0,10);d.min=new Date().toISOString().slice(0,10);}\n    var tm=document.getElementById('sf-time'); if(tm&&!tm.value)tm.value=\"15:00\";\n    modal.style.display='flex'; document.body.style.overflow='hidden';\n  };\n  // Any element marked [data-schedule] (Meet Me button, contact card, footer link)\n  // opens the scheduler. This delegated handler is what was missing \u2014 the buttons\n  // existed but nothing called openScheduleModal().\n  document.addEventListener('click', function(e){\n    var t = e.target.closest('[data-schedule]');\n    if (t) { e.preventDefault(); window.openScheduleModal(); }\n  });\n  function close(){ modal.style.display='none'; document.body.style.overflow=''; }\n  document.getElementById('schedClose').onclick=close;\n  modal.addEventListener('click',function(e){ if(e.target===modal) close(); });\n  document.addEventListener('keydown',function(e){ if(e.key==='Escape'&&modal.style.display==='flex') close(); });\n  document.getElementById('sf-again').onclick=function(){ form.style.display=''; done.style.display='none'; };\n  var EMAIL_RE=/^[^\\s@]+@[^\\s@]+\\.[^\\s@]{2,}$/;\n  function cleanPhone(p){ return (p||'').replace(/[^\\d+]/g,''); }\n  function validPhone(p){ var d=cleanPhone(p).replace(/^\\+/,''); return d.length>=10 && d.length<=15; }\n  function pad(n){ return String(n).padStart(2,'0'); }\n  function gfmt(dt){ return dt.getUTCFullYear()+pad(dt.getUTCMonth()+1)+pad(dt.getUTCDate())+'T'+pad(dt.getUTCHours())+pad(dt.getUTCMinutes())+'00Z'; }\n  form.addEventListener('submit',function(e){\n    e.preventDefault();\n    var name=document.getElementById('sf-name').value.trim();\n    var role=(document.getElementById('sf-role')||{}).value ? document.getElementById('sf-role').value.trim() : '';\n    var company=(document.getElementById('sf-company')||{}).value ? document.getElementById('sf-company').value.trim() : '';\n    var email=document.getElementById('sf-email').value.trim();\n    var phone=document.getElementById('sf-phone').value.trim();\n    var date=document.getElementById('sf-date').value, time=document.getElementById('sf-time').value;\n    var probs=[];\n    if(name.length<2) probs.push(\"a valid name\");\n    if(!EMAIL_RE.test(email)) probs.push(\"a valid email\");\n    if(!validPhone(phone)) probs.push(\"a valid mobile (10\u201315 digits)\");\n    if(!date||!time) probs.push(\"a date and time\");\n    var start=new Date(date+'T'+time);\n    if(date&&time&&(isNaN(start)||start.getTime()<Date.now())) probs.push(\"a future time\");\n    if(probs.length){ err.style.display='block'; err.textContent=\"Please enter \"+probs.join(\", \")+\".\"; return; }\n    err.style.display='none';\n    var who = name + (role||company ? \" (\"+[role,company].filter(Boolean).join(\" at \")+\")\" : \"\");\n    var end=new Date(start.getTime()+15*60000);\n    var title=encodeURIComponent(\"Intro call \u2014 \"+name+\" \u00d7 Anchit Tandon\");\n    var details=encodeURIComponent(\"15-min Google Meet.\\nGuest: \"+who+\" \u2014 \"+email+\", \"+phone+\"\\nHost: Anchit Tandon (\"+HOST_EMAIL+\", +91 98739 45238)\\n\\nGoogle attaches a Meet link and emails both guests.\");\n    var gcal=\"https://calendar.google.com/calendar/render?action=TEMPLATE&text=\"+title+\"&dates=\"+gfmt(start)+\"/\"+gfmt(end)+\"&details=\"+details+\"&add=\"+encodeURIComponent(HOST_EMAIL+\",\"+email)+\"&conferenceData=true&ctz=\"+encodeURIComponent(Intl.DateTimeFormat().resolvedOptions().timeZone||'Asia/Kolkata');\n    document.getElementById('sf-gcal').href=gcal;\n    var dateStr=start.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});\n    var timeStr=start.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});\n    // WhatsApp message from the user's number, in the requested template.\n    var roleCo = (role||company) ? (\"I am a \"+(role||\"professional\")+(company?\" at \"+company:\"\")+\" and \") : \"\";\n    var waMsg=encodeURIComponent(\"Hi Anchit, this is \"+name+\". \"+roleCo+\"I would like to meet you on \"+dateStr+\" at \"+timeStr+\". Looking forward to the same.\");\n    document.getElementById('sf-wa').href=\"https://wa.me/\"+HOST_WA+\"?text=\"+waMsg;\n    form.style.display='none'; done.style.display='block';\n  });\n})();\n<\/script>\n\n\n<!-- GLOBAL VIEW SWITCHER -->\n<div id=\"globalViewSwitcher\" style=\"position: fixed; bottom: 24px; right: 24px; z-index: 999999; display: flex; gap: 6px; background: rgba(10,10,12,0.85); backdrop-filter: blur(12px); padding: 6px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 8px 32px rgba(0,0,0,0.4);\">\n  <button onclick=\"goView('simple')\" style=\"color:#FBF5EC; background:transparent; border:none; border-radius:100px; cursor:pointer; padding:8px 16px; font-family:'Space Grotesk', system-ui, sans-serif; font-size:13px; font-weight:600; transition:all 0.2s;\" onmouseover=\"this.style.background='rgba(255,255,255,0.1)'\" onmouseout=\"this.style.background='transparent'\">\u2726 Editorial</button>\n  <button onclick=\"goView('cyber')\" style=\"color:#ff2b2b; background:transparent; border:none; border-radius:100px; cursor:pointer; padding:8px 16px; font-family:'Space Grotesk', system-ui, sans-serif; font-size:13px; font-weight:600; transition:all 0.2s;\" onmouseover=\"this.style.background='rgba(255,43,43,0.1)'\" onmouseout=\"this.style.background='transparent'\">\u2301 Cyberpunk</button>\n  <button onclick=\"goView('nexus')\" style=\"color:#00ff88; background:transparent; border:none; border-radius:100px; cursor:pointer; padding:8px 16px; font-family:'Space Grotesk', system-ui, sans-serif; font-size:13px; font-weight:600; transition:all 0.2s;\" onmouseover=\"this.style.background='rgba(0,255,136,0.1)'\" onmouseout=\"this.style.background='transparent'\">\u25ce God Mode</button>\n</div>\n<script>\n  function goView(v) {\n    try { localStorage.setItem('anchit-portfolio-view', v); } catch(e){}\n    location.href = v === 'simple' ? '/' : '/' + v + '/';\n  }\n  // Highlight active view\n  window.addEventListener('DOMContentLoaded', () => {\n    let current = 'simple';\n    if(location.pathname.includes('cyber')) current = 'cyber';\n    if(location.pathname.includes('nexus')) current = 'nexus';\n    const btns = document.getElementById('globalViewSwitcher').querySelectorAll('button');\n    if(current === 'simple') btns[0].style.background = 'rgba(255,255,255,0.15)';\n    if(current === 'cyber') btns[1].style.background = 'rgba(255,43,43,0.15)';\n    if(current === 'nexus') btns[2].style.background = 'rgba(0,255,136,0.15)';\n  });\n<\/script>\n\n\n\n<!-- GLOBAL NUDGE WIDGET -->\n<div id=\"globalNudgeWidget\" style=\"position: fixed; bottom: 80px; right: 24px; z-index: 999999; display: flex; flex-direction: column; gap: 12px; align-items: flex-end;\">\n  <!-- Mute Toggle -->\n  <button id=\"globalMuteBtn\" onclick=\"toggleGlobalMute()\" style=\"display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; background: rgba(10,10,12,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 8px 32px rgba(0,0,0,0.4); color: #fff; cursor: pointer; transition: all 0.2s;\" aria-label=\"Toggle Audio\">\n    <!-- Icon injected via JS -->\n  </button>\n  \n  <!-- Talk With Me Nudge -->\n  <button id=\"globalChatNudge\" onclick=\"triggerGlobalChatNudge()\" style=\"display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 100px; background: var(--primary, #00FF88); border: none; box-shadow: 0 8px 32px rgba(0, 255, 136, 0.4); color: #000; cursor: pointer; transition: all 0.2s; font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 14px; font-weight: 700;\">\n    <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"/></svg>\n    Talk With Me\n  </button>\n</div>\n\n<script>\n  function updateGlobalMuteIcon() {\n    const isMuted = localStorage.getItem('anchit-mute') === 'true';\n    const btn = document.getElementById('globalMuteBtn');\n    if (isMuted) {\n      btn.innerHTML = '<svg viewBox=\"0 0 24 24\" width=\"20\" height=\"20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"1\" y1=\"1\" x2=\"23\" y2=\"23\"></line><path d=\"M9 9v6a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6\"></path><path d=\"M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23\"></path><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"23\"></line><line x1=\"8\" y1=\"23\" x2=\"16\" y2=\"23\"></line></svg>'; // Mic off\n    } else {\n      btn.innerHTML = '<svg viewBox=\"0 0 24 24\" width=\"20\" height=\"20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z\"></path><path d=\"M19 10v2a7 7 0 0 1-14 0v-2\"></path><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"23\"></line><line x1=\"8\" y1=\"23\" x2=\"16\" y2=\"23\"></line></svg>'; // Mic on\n    }\n  }\n\n  function toggleGlobalMute() {\n    const isMuted = localStorage.getItem('anchit-mute') === 'true';\n    localStorage.setItem('anchit-mute', !isMuted);\n    updateGlobalMuteIcon();\n    if (!isMuted) { \n      // Muting now -> stop any ongoing speech\n      if (window.speechSynthesis) window.speechSynthesis.cancel();\n      if (window.audioMuted !== undefined) {\n         window.audioMuted = true;\n         if (typeof setPlayerState === 'function') setPlayerState(false);\n      }\n    } else {\n      // Unmuting\n      if (window.audioMuted !== undefined) {\n         window.audioMuted = false;\n      }\n    }\n  }\n\n  function triggerGlobalChatNudge() {\n    if (document.getElementById('cli')) { // Nexus\n      document.getElementById('cli').focus();\n    } else if (document.getElementById('ccInput')) { // Cyber\n      document.getElementById('chat').scrollIntoView({ behavior: 'smooth' });\n      setTimeout(() => document.getElementById('ccInput').focus(), 600);\n    } else if (document.getElementById('view-chat')) { // Simple\n      document.getElementById('view-chat').scrollIntoView({ behavior: 'smooth' });\n      setTimeout(() => {\n        const ci = document.getElementById('chat-input');\n        if(ci) ci.focus();\n      }, 600);\n    }\n  }\n\n  document.addEventListener('DOMContentLoaded', updateGlobalMuteIcon);\n<\/script>"};
    const TTS_URL = 'http://localhost:8000/api/tts';
    
    let userName = localStorage.getItem('anchit-user-name') || '';
    let chatHistory = JSON.parse(localStorage.getItem('anchit-chat-history') || '[]');
    let isRecording = false;
    let recognition = null;
    let currentAudio = null;

    // Elements
    const obEl = document.getElementById('onboarding');
    const obChat = document.getElementById('onboarding-chat');
    const obInput = document.getElementById('ob-input');
    const obMic = document.getElementById('ob-mic');
    
    const mainEl = document.getElementById('main-layout');
    const portContent = document.getElementById('portfolio-content');
    const fcBody = document.getElementById('fc-body');
    const fcInput = document.getElementById('fc-input');
    const fcMic = document.getElementById('fc-mic');
    
    // Init Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';
    }

    function addBubble(text, type, container) {
      const b = document.createElement('div');
      b.className = 'bubble ' + type;
      b.innerHTML = text;
      container.appendChild(b);
      container.scrollTop = container.scrollHeight;
      
      // Save history if it's the floating chat
      if (container === fcBody) {
        chatHistory.push({ text, type });
        localStorage.setItem('anchit-chat-history', JSON.stringify(chatHistory));
      }
    }

    async function speakText(text, container) {
      addBubble(text, 'system', container);
      
      try {
        const res = await fetch(TTS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (res.ok) {
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          if (currentAudio) currentAudio.pause();
          currentAudio = new Audio(url);
          currentAudio.play();
        } else {
          console.warn("TTS backend failed, falling back to browser TTS");
          fallbackTTS(text);
        }
      } catch (e) {
        console.warn("TTS connection failed, falling back to browser TTS", e);
        fallbackTTS(text);
      }
    }
    
    function fallbackTTS(text) {
      const u = new SpeechSynthesisUtterance(text);
      window.speechSynthesis.speak(u);
    }

    // App Initialization
    window.onload = () => {
      // Hide any legacy UI that might conflict from appended sections
      const globalNudge = document.getElementById('globalChatNudge');
      if(globalNudge) globalNudge.style.display = 'none';

      if (chatHistory.length > 0 && userName) {
        // Resume session
        obEl.classList.add('hidden');
        mainEl.classList.add('active');
        loadHistory();
        speakText(`Welcome back, ${userName}. Should we continue where we left off, or start fresh?`, fcBody);
        
        // Add action chips for Resume
        setTimeout(() => {
          const chipRow = document.createElement('div');
          chipRow.className = 'chips-row bubble system';
          chipRow.innerHTML = `
            <button class="chip" onclick="clearSession()">Start Fresh</button>
            <button class="chip" onclick="loadSection('highlights')">Show Highlights</button>
          `;
          fcBody.appendChild(chipRow);
          fcBody.scrollTop = fcBody.scrollHeight;
        }, 1000);
        
      } else {
        // New session
        speakText("Hi, I am Anchit. Welcome to my interactive portfolio. What's your name?", obChat);
      }
    };
    
    function loadHistory() {
      fcBody.innerHTML = '';
      chatHistory.forEach(msg => {
        const b = document.createElement('div');
        b.className = 'bubble ' + msg.type;
        b.innerHTML = msg.text;
        fcBody.appendChild(b);
      });
      fcBody.scrollTop = fcBody.scrollHeight;
    }
    
    window.clearSession = function() {
      chatHistory = [];
      localStorage.removeItem('anchit-chat-history');
      fcBody.innerHTML = '';
      speakText(`Clean slate. I have my Timeline, Hard Metrics, and Deep Projects available. What would you like to see?`, fcBody);
      showBriefChips();
    }

    // Handle Name Input
    obInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && obInput.value.trim()) {
        submitName(obInput.value.trim());
      }
    });
    
    function submitName(name) {
      userName = name;
      localStorage.setItem('anchit-user-name', userName);
      addBubble(name, 'user', obChat);
      obInput.value = '';
      document.getElementById('onboarding-input-row').style.display = 'none';
      
      setTimeout(() => {
        obEl.classList.add('hidden');
        mainEl.classList.add('active');
        speakText(`Nice to meet you, ${userName}. I build things that make money. I can walk you through my timeline, show you hard metrics, or dive into specific projects. What are you looking for?`, fcBody);
        showBriefChips();
      }, 1000);
    }
    
    function showBriefChips() {
      setTimeout(() => {
        const chipRow = document.createElement('div');
        chipRow.className = 'chips-row bubble system';
        chipRow.innerHTML = `
          <button class="chip" onclick="loadSection('timeline')">View Timeline</button>
          <button class="chip" onclick="loadSection('highlights')">View Metrics</button>
          <button class="chip" onclick="loadSection('projects')">Side Builds</button>
        `;
        fcBody.appendChild(chipRow);
        fcBody.scrollTop = fcBody.scrollHeight;
      }, 500);
    }

    // Dynamic Section Loading
    window.loadSection = function(key) {
      addBubble(`Load ${key}`, 'user', fcBody);
      if (sectionsData[key]) {
        portContent.innerHTML = sectionsData[key];
        // hide legacy widgets inside loaded content
        const gn = portContent.querySelectorAll('#globalChatNudge, #floatingChatWidget');
        gn.forEach(e => e.style.display = 'none');
        
        speakText(`Loading ${key}.`, fcBody);
        
        // Random follow-up nudge
        setTimeout(() => {
          speakText(`Let me know if you need help finding specific engineering details in this section.`, fcBody);
        }, 8000);
      } else {
        speakText(`I couldn't find that section.`, fcBody);
      }
    };

    // Floating Chat Input
    fcInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && fcInput.value.trim()) {
        const v = fcInput.value.trim();
        addBubble(v, 'user', fcBody);
        fcInput.value = '';
        handleQuery(v);
      }
    });
    
    function handleQuery(q) {
      // Simple routing logic based on keywords
      const lower = q.toLowerCase();
      if (lower.includes('metric') || lower.includes('highlight') || lower.includes('roi')) {
        loadSection('highlights');
      } else if (lower.includes('project') || lower.includes('build')) {
        loadSection('projects');
      } else if (lower.includes('timeline') || lower.includes('journey')) {
        loadSection('timeline');
      } else if (lower.includes('deep') || lower.includes('experience')) {
        loadSection('deep_exp');
      } else if (lower.includes('resume')) {
        loadSection('resume');
      } else if (lower.includes('contact')) {
        loadSection('contact');
      } else {
        speakText(`I'm a static AI construct right now, so I don't have an LLM attached to answer arbitrary questions, but I can navigate you! Try asking for my Resume or Projects.`, fcBody);
      }
    }

    // Voice to Text Setup
    function setupMic(micBtn, inputEl, callback) {
      if (!recognition) {
        micBtn.style.opacity = '0.5';
        return;
      }
      
      micBtn.addEventListener('click', () => {
        if (isRecording) {
          recognition.stop();
          return;
        }
        
        recognition.start();
        isRecording = true;
        micBtn.classList.add('recording');
        
        recognition.onresult = (e) => {
          let transcript = '';
          for (let i = e.resultIndex; i < e.results.length; ++i) {
            transcript += e.results[i][0].transcript;
          }
          inputEl.value = transcript;
        };
        
        recognition.onend = () => {
          isRecording = false;
          micBtn.classList.remove('recording');
          if (inputEl.value.trim()) {
            callback(inputEl.value.trim());
          }
        };
      });
    }
    
    setupMic(obMic, obInput, submitName);
    setupMic(fcMic, fcInput, (val) => {
      addBubble(val, 'user', fcBody);
      fcInput.value = '';
      handleQuery(val);
    });

  </script>
</body>
</html>
