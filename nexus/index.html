<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Anchit // NEURAL NEXUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030305;
      --acc: #00ff88;
      --acc-dim: rgba(0,255,136,0.2);
      --txt: #f0f0f5;
      --txt-mute: #707080;
      --danger: #ff3366;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--txt); font-family: var(--sans); overflow: hidden; height: 100vh; width: 100vw; user-select: none; }
    
    #bg-canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    
    /* Overlay HUD */
    #hud { position: absolute; inset: 0; z-index: 10; pointer-events: none; padding: 20px; display: grid; grid-template-rows: auto 1fr auto; }
    .hud-element { pointer-events: auto; }
    
    /* Top Bar */
    header { display: flex; justify-content: space-between; align-items: flex-start; }
    .logo { font-family: var(--mono); font-weight: 700; font-size: 14px; letter-spacing: 0.2em; color: var(--txt); text-shadow: 0 0 10px var(--acc-dim); }
    .logo b { color: var(--acc); }
    
    /* Avatar / Transmission Box */
    .transmission { width: 320px; background: rgba(10,10,15,0.8); border: 1px solid var(--acc-dim); border-left: 3px solid var(--acc); padding: 15px; position: relative; backdrop-filter: blur(10px); transition: transform 0.3s, box-shadow 0.3s; }
    .transmission.speaking { box-shadow: 0 0 20px var(--acc-dim), inset 0 0 10px var(--acc-dim); border-color: var(--acc); transform: scale(1.02); }
    .t-header { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--acc); display: flex; justify-content: space-between; margin-bottom: 10px; }
    .t-header .rec { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
    .avatar-vid { width: 100%; height: 180px; background: #000; position: relative; overflow: hidden; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
    .avatar-glitch { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.1) 2px, rgba(0,255,136,0.1) 4px); pointer-events: none; z-index: 2; }
    .avatar-vis { position: absolute; bottom: 0; left: 0; right: 0; height: 30px; display: flex; align-items: flex-end; gap: 2px; padding: 0 5px; opacity: 0.5; }
    .vis-bar { flex: 1; background: var(--acc); height: 2px; transition: height 0.05s ease; }
    .t-subs { font-family: var(--mono); font-size: 12px; line-height: 1.4; color: var(--txt); min-height: 40px; }
    
    /* Center Stage */
    .center-stage { align-self: center; justify-self: center; text-align: center; max-width: 800px; display: flex; flex-direction: column; gap: 30px; opacity: 0; transform: translateY(20px); transition: opacity 1s, transform 1s; }
    .center-stage.active { opacity: 1; transform: translateY(0); }
    h1 { font-size: 4vw; font-weight: 300; text-transform: uppercase; letter-spacing: -0.02em; line-height: 1; margin-bottom: 10px; }
    h1 b { font-weight: 700; color: var(--acc); }
    .kicker { font-family: var(--mono); font-size: 14px; letter-spacing: 0.1em; color: var(--txt-mute); }
    
    .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 40px; }
    .nav-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 20px; color: var(--txt); font-family: var(--mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; text-align: left; }
    .nav-btn:hover { background: rgba(0,255,136,0.1); border-color: var(--acc); color: var(--acc); box-shadow: 0 0 15px var(--acc-dim); transform: translateY(-2px); }
    .nav-btn::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--acc); transform: scaleY(0); transition: transform 0.2s; transform-origin: bottom; }
    .nav-btn:hover::before { transform: scaleY(1); }
    .nav-btn span { display: block; font-size: 18px; font-family: var(--sans); font-weight: 600; margin-top: 5px; color: var(--txt); }
    
    /* Recruiter Fast Track */
    .recruiter-mode { background: var(--danger); border: none; color: #fff; padding: 15px 30px; font-family: var(--mono); font-size: 14px; font-weight: 700; letter-spacing: 0.1em; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; margin-top: 30px; align-self: center; text-transform: uppercase; animation: pulseRed 2s infinite; }
    .recruiter-mode:hover { filter: brightness(1.2); }
    
    /* Modals */
    .modal { position: fixed; inset: 0; z-index: 100; background: rgba(3,3,5,0.9); backdrop-filter: blur(10px); display: none; padding: 40px; overflow-y: auto; }
    .modal.open { display: block; }
    .modal-close { position: absolute; top: 30px; right: 30px; background: none; border: none; color: var(--txt); font-size: 30px; cursor: pointer; }
    .m-content { max-width: 900px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.1); background: rgba(20,20,25,0.5); padding: 40px; position: relative; }
    .m-content::before { content: ''; position: absolute; top: 0; left: 0; width: 30px; height: 3px; background: var(--acc); }
    
    .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-family: var(--mono); font-size: 14px; }
    .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .data-table th { color: var(--acc); font-weight: 400; text-transform: uppercase; }
    .data-table tr:hover { background: rgba(255,255,255,0.02); }
    .metric { font-size: 24px; color: var(--txt); font-family: var(--sans); font-weight: 600; }
    
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes pulseRed { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,51,102,0.4); } 50% { box-shadow: 0 0 0 15px rgba(255,51,102,0); } }
    
    /* Setup overlay */
    #init-overlay { position: fixed; inset: 0; z-index: 200; background: #000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .init-btn { background: transparent; border: 1px solid var(--acc); color: var(--acc); padding: 15px 40px; font-family: var(--mono); font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.2em; transition: 0.3s; }
    .init-btn:hover { background: var(--acc); color: #000; box-shadow: 0 0 30px var(--acc-dim); }
    
    /* View Switcher Back */
    .back-to-earth { position: fixed; bottom: 20px; left: 20px; font-family: var(--mono); font-size: 10px; color: var(--txt-mute); text-decoration: none; border-bottom: 1px solid var(--txt-mute); pointer-events: auto; }
    .back-to-earth:hover { color: var(--txt); border-color: var(--txt); }
    
  </style>
</head>
<body>

  <div id="init-overlay">
    <div style="font-family: var(--mono); font-size: 12px; color: var(--txt-mute); margin-bottom: 20px;">SYSTEM REQUIRES AUDIO CLEARANCE</div>
    <button class="init-btn" id="start-btn">INITIALIZE NEURAL LINK</button>
  </div>

  <canvas id="bg-canvas"></canvas>

  <div id="hud">
    <header>
      <div class="logo hud-element">ANCHIT_<b>OS</b> // v2.0</div>
      
      <div class="transmission hud-element" id="avatar-box">
        <div class="t-header">
          <span>AI Persona Active</span>
          <span><span class="rec"></span> LIVE</span>
        </div>
        <div class="avatar-vid">
          <div class="avatar-glitch"></div>
          <!-- Fake video representation -->
          <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.2); text-align: center; padding: 20px;">
            [VIDEO FEED ENCRYPTED]<br><br>Model: Anchit.Tandon<br>Engine: Local WebSpeech Synthesis
          </div>
          <div class="avatar-vis" id="vis-bars">
            <!-- Bars added by JS -->
          </div>
        </div>
        <div class="t-subs" id="subs">Awaiting connection...</div>
      </div>
    </header>
    
    <div class="center-stage" id="main-ui">
      <div>
        <div class="kicker">PROFILE MATCH: HIRING MANAGER DETECTED</div>
        <h1>An <b>engineer</b> who learned to<br>love the <b>funnel</b>.</h1>
      </div>
      
      <div class="nav-grid">
        <button class="nav-btn hud-element" onclick="triggerNode('metrics')">Node 01<span>Hard Metrics</span></button>
        <button class="nav-btn hud-element" onclick="triggerNode('products')">Node 02<span>Products Shipped</span></button>
        <button class="nav-btn hud-element" onclick="triggerNode('builds')">Node 03<span>AI Side Builds</span></button>
      </div>
      
      <button class="recruiter-mode hud-element" onclick="triggerNode('recruit')">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Bypass BS: Show me the ROI
      </button>
    </div>
    
    <footer>
      <a href="/" class="back-to-earth hud-element">← RETURN TO EDITORIAL VIEW</a>
    </footer>
  </div>

  <!-- Modals -->
  <div class="modal hud-element" id="modal-wrapper">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="m-content" id="modal-content"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    const $ = s => document.querySelector(s);
    
    // --- 3D Background ---
    let scene, camera, renderer, particles;
    function init3D() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ canvas: $('#bg-canvas'), alpha: true, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      
      const geom = new THREE.BufferGeometry();
      const count = 3000;
      const positions = new Float32Array(count * 3);
      for(let i=0; i<count*3; i++) {
        positions[i] = (Math.random() - 0.5) * 20;
      }
      geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({ color: 0x00ff88, size: 0.02, transparent: true, opacity: 0.4 });
      particles = new THREE.Points(geom, mat);
      scene.add(particles);
      
      camera.position.z = 5;
      
      let mx = 0, my = 0;
      window.addEventListener('pointermove', e => {
        mx = (e.clientX / window.innerWidth - 0.5) * 2;
        my = -(e.clientY / window.innerHeight - 0.5) * 2;
      });
      
      function animate() {
        requestAnimationFrame(animate);
        particles.rotation.y += 0.001;
        particles.rotation.x += 0.0005;
        camera.position.x += (mx - camera.position.x) * 0.05;
        camera.position.y += (my - camera.position.y) * 0.05;
        camera.lookAt(scene.position);
        
        // If speaking, jitter the particles
        if(isSpeaking) {
          const positions = particles.geometry.attributes.position.array;
          for(let i=0; i<count*3; i+=3) {
            positions[i+1] += (Math.random()-0.5)*0.02;
          }
          particles.geometry.attributes.position.needsUpdate = true;
        }
        
        renderer.render(scene, camera);
      }
      animate();
    }
    
    // --- Avatar Logic ---
    let synth = window.speechSynthesis;
    let preferredVoice = null;
    let isSpeaking = false;
    let visBars = [];
    
    // Setup visualizer
    const visContainer = $('#vis-bars');
    for(let i=0; i<20; i++) {
      const b = document.createElement('div');
      b.className = 'vis-bar';
      visContainer.appendChild(b);
      visBars.push(b);
    }
    
    setInterval(() => {
      if(isSpeaking) {
        visBars.forEach(b => { b.style.height = (10 + Math.random() * 20) + 'px'; });
      } else {
        visBars.forEach(b => { b.style.height = '2px'; });
      }
    }, 50);

    function loadVoices() {
      const voices = synth.getVoices();
      // Try to find a good authoritative or techy voice
      preferredVoice = voices.find(v => v.name.includes('Daniel') || v.name.includes('Google UK English Male')) || voices[0];
    }
    synth.onvoiceschanged = loadVoices;

    function speak(text, subtitle) {
      if(synth.speaking) synth.cancel();
      $('#subs').innerHTML = subtitle || text;
      
      const utter = new SpeechSynthesisUtterance(text);
      if(preferredVoice) utter.voice = preferredVoice;
      utter.rate = 1.05;
      utter.pitch = 0.9;
      
      utter.onstart = () => { isSpeaking = true; $('#avatar-box').classList.add('speaking'); };
      utter.onend = () => { isSpeaking = false; $('#avatar-box').classList.remove('speaking'); };
      utter.onerror = () => { isSpeaking = false; $('#avatar-box').classList.remove('speaking'); };
      
      synth.speak(utter);
    }

    // --- Content & Scripts ---
    const scripts = {
      intro: {
        text: "System initialized. Scanning visitor... Profile matches: Recruiter or Hiring Manager. Excellent. I am the digital construct of Anchit Tandon. I could show you a boring PDF resume, but where is the fun in that? I build things that make money. Let me show you.",
        sub: "System initialized. Scanning visitor... Profile matches: Recruiter or Hiring Manager. Excellent.<br><br>I am the digital construct of Anchit Tandon. I could show you a boring PDF resume, but where's the fun in that? Let me show you what I build."
      },
      metrics: {
        text: "You want the numbers. Fine. 5X MRR growth at Times Internet. Three Crore ARR unlocked. Product ratings from 2.4 to 4.0. I don't just ship features, I engineer the funnel.",
        html: `<h2>Hard Metrics</h2>
               <table class="data-table">
                 <tr><th>Metric</th><th>Context</th><th>Impact</th></tr>
                 <tr><td><span class="metric">5X MRR</span></td><td>Assisted Sales at ET Prime. Built an AI telesuite for the floor.</td><td>₹15L to ₹80L in 8 months</td></tr>
                 <tr><td><span class="metric">₹3Cr+ ARR</span></td><td>ET Markets Revamp (Web/App).</td><td>+27% Engagement, +25% DAU</td></tr>
                 <tr><td><span class="metric">2.4 → 4.0</span></td><td>Vahdam India D2C App Ratings.</td><td>Sustained daily revenue growth</td></tr>
               </table>`
      },
      products: {
        text: "I have shipped 11 products total. Ranging from 0-to-1 consumer IPs like the Times Half Marathon, to complex paid wellness subscriptions. All delivered end-to-end.",
        html: `<h2>Products Shipped</h2>
               <ul style="color:var(--txt); font-size:16px; line-height:1.6; margin-top:20px; padding-left:20px;">
                 <li><b>Vahdam Lifecycle OS:</b> A massive PWA retention engine.</li>
                 <li><b>Times Half Marathon:</b> 0→1 consumer IP event.</li>
                 <li><b>Assisted Sales AI:</b> Real-time pitch scoring telesuite.</li>
                 <li><b>Times Health+ Subscriptions:</b> Freemium to paid journey.</li>
                 <li><b>ET Markets App:</b> Total structural rebuild.</li>
               </ul>`
      },
      builds: {
        text: "Ah, my side builds. The things I code when I should be sleeping. Music AI, personal operating systems, email generation cascades. It is how I stay sharp technically while leading product.",
        html: `<h2>AI Side Builds</h2>
               <p style="color:var(--txt-mute); margin-top:10px;">All live. All built by me.</p>
               <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px;">
                 <div style="border:1px solid rgba(255,255,255,0.1); padding:15px;"><b>MusicGenAI</b><br><span style="color:var(--txt-mute);font-size:12px;">React + Python pipeline</span></div>
                 <div style="border:1px solid rgba(255,255,255,0.1); padding:15px;"><b>The Third Eye</b><br><span style="color:var(--txt-mute);font-size:12px;">Personal AI OS</span></div>
                 <div style="border:1px solid rgba(255,255,255,0.1); padding:15px;"><b>Mailer Architect</b><br><span style="color:var(--txt-mute);font-size:12px;">6-LLM cascade email gen</span></div>
                 <div style="border:1px solid rgba(255,255,255,0.1); padding:15px;"><b>Hey Yaara</b><br><span style="color:var(--txt-mute);font-size:12px;">Voice companion for elderly</span></div>
               </div>`
      },
      recruit: {
        text: "Alright, let's cut the sci-fi act. You are busy, I am busy. Here is my resume, my email, and a button to book a call with me. Let's build something massive together.",
        html: `<div style="text-align:center;">
                 <h2 style="color:var(--danger); margin-bottom:10px;">THE ROI VIEW</h2>
                 <p style="color:var(--txt-mute); margin-bottom:30px;">You're hiring for an outcome. I deliver outcomes.</p>
                 <a href="/assets/resume.pdf" target="_blank" style="display:inline-block; background:var(--txt); color:#000; padding:15px 30px; text-decoration:none; font-family:var(--mono); font-weight:bold; margin-right:10px;">DOWNLOAD RESUME.PDF</a>
                 <a href="mailto:anchit.tandon@gmail.com" style="display:inline-block; border:1px solid var(--txt); color:var(--txt); padding:15px 30px; text-decoration:none; font-family:var(--mono); font-weight:bold;">EMAIL ME</a>
                 <br><br>
                 <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Intro%20call%20%E2%80%94%20Anchit%20Tandon&add=anchit.tandon@gmail.com" target="_blank" style="display:inline-block; background:var(--danger); color:#fff; padding:15px 30px; text-decoration:none; font-family:var(--mono); font-weight:bold; margin-top:20px;">BOOK A 15-MIN GOOGLE MEET</a>
               </div>`
      }
    };

    function triggerNode(nodeId) {
      const data = scripts[nodeId];
      if(!data) return;
      
      speak(data.text);
      $('#modal-content').innerHTML = data.html;
      $('#modal-wrapper').classList.add('open');
    }
    
    function closeModal() {
      $('#modal-wrapper').classList.remove('open');
      if(synth.speaking) synth.cancel();
      $('#subs').innerHTML = "Awaiting command...";
    }

    // --- Init ---
    $('#start-btn').addEventListener('click', () => {
      $('#init-overlay').style.display = 'none';
      init3D();
      loadVoices();
      
      setTimeout(() => {
        $('#main-ui').classList.add('active');
        speak(scripts.intro.text, scripts.intro.sub);
      }, 1000);
    });

    window.addEventListener('resize', () => {
      if(camera && renderer) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    });
  </script>
</body>
</html>
